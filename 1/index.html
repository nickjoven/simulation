<!doctype html>
<meta charset=utf-8>
<title>∑ jₗ(kr)·Yₗᵐ · hop</title>
<style>
  html,body{margin:0;height:100%;background:#000;color:#9cf;font:11px/1.35 ui-monospace,monospace;overflow:hidden}
  #hud{position:fixed;top:8px;left:10px;pointer-events:none;white-space:pre;mix-blend-mode:screen;opacity:.85}
  canvas{display:block}
  .lil-gui{--background-color:#0a0f14;--text-color:#9cf;--title-background-color:#111;--widget-color:#1a2230;--hover-color:#243040;--focus-color:#2d3a4d;--number-color:#cfe;--string-color:#fc9;--font-size:11px;--input-font-size:11px}
</style>
<div id=hud></div>
<script type=importmap>
{"imports":{
  "three":"https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/",
  "lil-gui":"https://unpkg.com/lil-gui@0.19.2/dist/lil-gui.esm.js"
}}
</script>
<script type=module>
import * as THREE from 'three'
import { OrbitControls } from 'three/addons/controls/OrbitControls.js'
import GUI from 'lil-gui'
import { VS, FS_PRELUDE, FS_MARCH, ALPHA, bakeMode, defaultPalette } from '../common.js'

// ψ(p,t) = [ (1-h)·fA(p) + h·fB(p) ] · cos(ωt)
// fA, fB baked into 3D textures once per preset change.

const EXTRA = `
uniform sampler3D volA;
uniform sampler3D volB;
uniform float h;
`
const PSI = `
float a = V(volA, p);
float b = V(volB, p);
psi = mix(a, b, h) * cos(w*t);
`
const fs = FS_PRELUDE + FS_MARCH(EXTRA, PSI)

const scene = new THREE.Scene()
const cam = new THREE.PerspectiveCamera(35, innerWidth/innerHeight, .1, 100)
cam.position.set(0, 0, 3.4)
const rnd = new THREE.WebGLRenderer({antialias:true})
rnd.setSize(innerWidth, innerHeight)
rnd.setPixelRatio(Math.min(devicePixelRatio, 2))
document.body.append(rnd.domElement)
addEventListener('resize', ()=>{
  cam.aspect = innerWidth/innerHeight; cam.updateProjectionMatrix()
  rnd.setSize(innerWidth, innerHeight)
})

const u = {
  ...defaultPalette(),
  t:{value:0}, w:{value:2}, gain:{value:18}, STEPS:{value:96},
  volA:{value: null}, volB:{value: null}, h:{value: 0},
}
const mat = new THREE.ShaderMaterial({
  vertexShader: VS, fragmentShader: fs, uniforms: u,
  glslVersion: THREE.GLSL3,
})
const sph = new THREE.Mesh(new THREE.SphereGeometry(1.001, 96, 48), mat)
scene.add(sph)
const ctl = new OrbitControls(cam, rnd.domElement)
ctl.enableDamping = true
ctl.autoRotate = true
ctl.autoRotateSpeed = 0.6

// presets (ℓ, m, n)
const P = {
  '3,2,1':[3,2,1], '4,0,1':[4,0,1], '4,2,1':[4,2,1],
  '5,3,1':[5,3,1], '5,5,1':[5,5,1], '2,0,1':[2,0,1],
  '0,0,1':[0,0,1], '0,0,2':[0,0,2], '1,0,1':[1,0,1],
  '3,0,2':[3,0,2], '2,2,2':[2,2,2], '4,2,2':[4,2,2],
}
const S = {
  A:'3,2,1', B:'4,0,1',
  ω: 2.0, Δt: 3.0, h: 0.0, auto: true, gain: 18, STEPS: 96, N: 64,
  rotate: true,
}
const apply = ()=>{
  if(u.volA.value) u.volA.value.dispose()
  if(u.volB.value) u.volB.value.dispose()
  const [L1, M1, N1] = P[S.A], [L2, M2, N2] = P[S.B]
  u.volA.value = bakeMode(L1, M1, ALPHA[L1][N1-1], S.N)
  u.volB.value = bakeMode(L2, M2, ALPHA[L2][N2-1], S.N)
  u.w.value = S.ω; u.gain.value = S.gain; u.STEPS.value = S.STEPS
}
apply()

const gui = new GUI({title:'mode hop · 3D'})
gui.add(S,'A', Object.keys(P)).onChange(apply)
gui.add(S,'B', Object.keys(P)).onChange(apply)
gui.add(S,'h', 0, 1, 0.001).listen().onChange(v=>u.h.value=v)
gui.add(S,'auto').name('auto h(t)')
gui.add(S,'Δt', 0.2, 10, 0.1).name('Δt / s')
gui.add(S,'ω',  0, 12, 0.05).onChange(v=>u.w.value=v)
gui.add(S,'gain', 1, 80, 0.5).onChange(v=>u.gain.value=v)
gui.add(S,'STEPS', 24, 256, 4).onChange(v=>u.STEPS.value=v)
gui.add(S,'N', 32, 128, 16).name('bake N').onChange(apply)
gui.add(S,'rotate').onChange(v=>ctl.autoRotate=v)

const hud = document.getElementById('hud')
let last = performance.now(), ph = 0
function loop(){
  const now = performance.now()
  const dt = (now - last) * 1e-3; last = now
  u.t.value += dt
  if(S.auto){
    ph += dt / Math.max(S.Δt, 0.05)
    const p = ph % 2
    S.h = p < 1 ? p : 2 - p
    u.h.value = S.h
  }
  ctl.update()
  rnd.render(scene, cam)
  hud.textContent =
    `A=(${S.A})  B=(${S.B})  bake=${S.N}³\n`+
    `h=${S.h.toFixed(3)}  ω=${S.ω.toFixed(2)}  t=${u.t.value.toFixed(1)}  STEPS=${u.STEPS.value}`
  requestAnimationFrame(loop)
}
loop()
</script>
