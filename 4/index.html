<!doctype html>
<meta charset=utf-8>
<title>phase conjugation · ψ* ↔ ψ · 3D</title>
<style>
  html,body{margin:0;height:100%;background:#000;color:#9cf;font:11px/1.35 ui-monospace,monospace;overflow:hidden}
  #hud{position:fixed;top:8px;left:10px;pointer-events:none;white-space:pre;mix-blend-mode:screen;opacity:.9}
  #lbl{position:fixed;left:0;right:0;pointer-events:none}
  #lbl .t{position:absolute;color:#fc9;font:11px ui-monospace,monospace;padding:3px 6px;background:rgba(0,0,0,.4);mix-blend-mode:screen}
  canvas{display:block}
  .lil-gui{--background-color:#0a0f14;--text-color:#9cf;--title-background-color:#111;--widget-color:#1a2230;--hover-color:#243040;--focus-color:#2d3a4d;--number-color:#cfe;--string-color:#fc9;--font-size:11px;--input-font-size:11px}
</style>
<div id=hud></div>
<div id=lbl>
  <span class=t style="top:14vh;right:16vw">y > 0 : raw</span>
  <span class=t style="bottom:14vh;right:16vw">y < 0 : ψ*</span>
</div>
<script type=importmap>
{"imports":{
  "three":"https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/",
  "lil-gui":"https://unpkg.com/lil-gui@0.19.2/dist/lil-gui.esm.js"
}}
</script>
<script type=module>
import * as THREE from 'three'
import { OrbitControls } from 'three/addons/controls/OrbitControls.js'
import GUI from 'lil-gui'
import { VS, FS_PRELUDE, FS_MARCH, ALPHA, bakeMode } from '../common.js'

// 4 baked modes · (ℓ,m,n) = {(2,1,1),(3,2,1),(4,0,1),(5,3,1)}
// raw  = Σₖ aₖ fₖ cos(ω(1+εδₖ)t + ηφₖ)
// conj = (Σₖ aₖ fₖ) · cos(ωt)

const EXTRA = `
uniform sampler3D vol0;
uniform sampler3D vol1;
uniform sampler3D vol2;
uniform sampler3D vol3;
uniform float eps, eta;
uniform vec4  amp, delta, phase;
uniform int   mode;
`
const PSI = `
float f0 = amp.x * V(vol0, p);
float f1 = amp.y * V(vol1, p);
float f2 = amp.z * V(vol2, p);
float f3 = amp.w * V(vol3, p);
float raw = f0*cos(w*(1.+eps*delta.x)*t + eta*phase.x)
          + f1*cos(w*(1.+eps*delta.y)*t + eta*phase.y)
          + f2*cos(w*(1.+eps*delta.z)*t + eta*phase.z)
          + f3*cos(w*(1.+eps*delta.w)*t + eta*phase.w);
float cnj = (f0 + f1 + f2 + f3) * cos(w*t);
if(mode == 0)      psi = raw;
else if(mode == 1) psi = cnj;
else               psi = p.y > 0. ? raw : cnj;
`
const fs = FS_PRELUDE + FS_MARCH(EXTRA, PSI)

const scene = new THREE.Scene()
const cam = new THREE.PerspectiveCamera(35, innerWidth/innerHeight, .1, 100)
cam.position.set(0, 0, 3.4)
const rnd = new THREE.WebGLRenderer({antialias:true})
rnd.setSize(innerWidth, innerHeight)
rnd.setPixelRatio(Math.min(devicePixelRatio, 2))
document.body.append(rnd.domElement)
addEventListener('resize', ()=>{
  cam.aspect = innerWidth/innerHeight; cam.updateProjectionMatrix()
  rnd.setSize(innerWidth, innerHeight)
})

const u = {
  t:{value:0}, w:{value:2}, gain:{value:40}, STEPS:{value:96},
  vol0:{value:null}, vol1:{value:null}, vol2:{value:null}, vol3:{value:null},
  eps:{value:0.12}, eta:{value:1.0},
  amp:   {value: new THREE.Vector4(1, 1, 1, 1)},
  delta: {value: new THREE.Vector4(0, 0, 0, 0)},
  phase: {value: new THREE.Vector4(0, 0, 0, 0)},
  mode:  {value: 2},
}
const mat = new THREE.ShaderMaterial({
  vertexShader: VS, fragmentShader: fs, uniforms: u,
  glslVersion: THREE.GLSL3,
})
const sph = new THREE.Mesh(new THREE.SphereGeometry(1.001, 96, 48), mat)
scene.add(sph)
const ctl = new OrbitControls(cam, rnd.domElement)
ctl.enableDamping = true
ctl.autoRotate = true
ctl.autoRotateSpeed = 0.4

const S = {
  mode: 'split',
  ε: 0.12, η: 1.0, ω: 2.0, gain: 40, STEPS: 96, N: 64,
  a0: 1, a1: 1, a2: 1, a3: 1,
  rotate: true,
}

const MODES = [ [2,1], [3,2], [4,0], [5,3] ]
function rebake(){
  const targets = ['vol0','vol1','vol2','vol3']
  for(let i = 0; i < 4; i++){
    if(u[targets[i]].value) u[targets[i]].value.dispose()
    const [L, M] = MODES[i]
    u[targets[i]].value = bakeMode(L, M, ALPHA[L][0], S.N)
  }
}
rebake()

const randomize = ()=>{
  u.delta.value.set(2*Math.random()-1, 2*Math.random()-1, 2*Math.random()-1, 2*Math.random()-1)
  u.phase.value.set(2*Math.PI*Math.random(), 2*Math.PI*Math.random(), 2*Math.PI*Math.random(), 2*Math.PI*Math.random())
}
randomize()

const sync = ()=>{
  u.amp.value.set(S.a0, S.a1, S.a2, S.a3)
  u.eps.value = S.ε; u.eta.value = S.η
  u.w.value = S.ω; u.gain.value = S.gain; u.STEPS.value = S.STEPS
  u.mode.value = {raw:0, conj:1, split:2}[S.mode]
}
sync()

const gui = new GUI({title:'ψ* · 3D'})
gui.add(S,'mode', ['raw','conj','split']).onChange(sync)
gui.add(S,'ε', 0, 0.4, 0.001).onChange(sync).name('ε (detune)')
gui.add(S,'η', 0, Math.PI*2, 0.01).onChange(sync).name('η (phase)')
gui.add(S,'ω', 0.2, 8, 0.05).onChange(sync)
gui.add(S,'gain', 1, 200, 1).onChange(sync)
gui.add(S,'STEPS', 32, 256, 4).onChange(sync)
gui.add(S,'N', 32, 128, 16).name('bake N').onChange(rebake)
const mf = gui.addFolder('aₖ')
mf.add(S,'a0', 0, 2, 0.01).onChange(sync).name('j₂Y₂¹')
mf.add(S,'a1', 0, 2, 0.01).onChange(sync).name('j₃Y₃²')
mf.add(S,'a2', 0, 2, 0.01).onChange(sync).name('j₄Y₄⁰')
mf.add(S,'a3', 0, 2, 0.01).onChange(sync).name('j₅Y₅³')
gui.add({roll: randomize}, 'roll').name('↻ δₖ, φₖ')
gui.add(S,'rotate').onChange(v=>ctl.autoRotate=v)

const hud = document.getElementById('hud')
let last = performance.now()
function loop(){
  const now = performance.now()
  const dt = (now - last) * 1e-3; last = now
  u.t.value += dt
  ctl.update()
  rnd.render(scene, cam)
  const d = u.delta.value, p = u.phase.value
  hud.textContent =
    `mode = ${S.mode}   ω = ${S.ω.toFixed(2)}   t = ${u.t.value.toFixed(1)}\n`+
    `ε = ${S.ε.toFixed(3)}   η = ${S.η.toFixed(3)}   bake = ${S.N}³\n`+
    `δ = (${d.x.toFixed(2)}, ${d.y.toFixed(2)}, ${d.z.toFixed(2)}, ${d.w.toFixed(2)})\n`+
    `φ = (${p.x.toFixed(2)}, ${p.y.toFixed(2)}, ${p.z.toFixed(2)}, ${p.w.toFixed(2)})`
  requestAnimationFrame(loop)
}
loop()
</script>
