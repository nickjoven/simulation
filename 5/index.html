<!doctype html>
<meta charset=utf-8>
<title>∇U tweezing · 3D</title>
<style>
  html,body{margin:0;height:100%;background:#000;color:#9cf;font:11px/1.35 ui-monospace,monospace;overflow:hidden}
  #hud{position:fixed;top:8px;left:10px;pointer-events:none;white-space:pre;mix-blend-mode:screen;opacity:.9}
  canvas{display:block}
  .lil-gui{--background-color:#0a0f14;--text-color:#9cf;--title-background-color:#111;--widget-color:#1a2230;--hover-color:#243040;--focus-color:#2d3a4d;--number-color:#cfe;--string-color:#fc9;--font-size:11px;--input-font-size:11px}
</style>
<div id=hud></div>
<script type=importmap>
{"imports":{
  "three":"https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/",
  "lil-gui":"https://unpkg.com/lil-gui@0.19.2/dist/lil-gui.esm.js"
}}
</script>
<script type=module>
import * as THREE from 'three'
import { OrbitControls } from 'three/addons/controls/OrbitControls.js'
import GUI from 'lil-gui'
import { VS, FS_PRELUDE, FS_MARCH, ALPHA, Y, jL } from '../common.js'

// U(p) = [jₗ(kr)·Yₗᵐ(Rᵀ p̂)]²   (time-averaged potential)
// ṗ = −σγ∇U(p) ,  p ∈ B³  (clamped at r = 1)
// σ = +1 : nodes (U = 0) attract ;  σ = −1 : antinodes attract

const EXTRA = `
uniform mat3 Rt;   // Rᵀ : world → mode frame
`
const PSI = `
float r = length(p);
vec3 nh = p / max(r, 1e-5);
vec3 nf = Rt * nh;
psi = jL(L, k*r) * Y(L, M, nf);
`
const fs = FS_PRELUDE + FS_MARCH(EXTRA, PSI)

const scene = new THREE.Scene()
const cam = new THREE.PerspectiveCamera(35, innerWidth/innerHeight, .1, 100)
cam.position.set(0, 0, 3.4)
const rnd = new THREE.WebGLRenderer({antialias:true})
rnd.setSize(innerWidth, innerHeight)
rnd.setPixelRatio(Math.min(devicePixelRatio, 2))
document.body.append(rnd.domElement)
addEventListener('resize', ()=>{
  cam.aspect = innerWidth/innerHeight; cam.updateProjectionMatrix()
  rnd.setSize(innerWidth, innerHeight)
})

const u = {
  t:{value:0}, w:{value:0}, gain:{value:18}, STEPS:{value:128},
  L:{value:3}, M:{value:2}, k:{value:ALPHA[3][0]},
  Rt:{value: new THREE.Matrix3()},
}
const mat = new THREE.ShaderMaterial({
  vertexShader: VS,
  fragmentShader: fs,
  uniforms: u,
})
const sph = new THREE.Mesh(new THREE.SphereGeometry(1.001, 96, 48), mat)
scene.add(sph)

// particles in B³
const N = 256
const pos = new Float32Array(N * 3)
function seed(){
  for(let i = 0; i < N; i++){
    const r = Math.cbrt(Math.random())
    const z = 2*Math.random() - 1, s = Math.sqrt(1 - z*z)
    const φ = 2*Math.PI*Math.random()
    pos[3*i+0] = r * s * Math.cos(φ)
    pos[3*i+1] = r * s * Math.sin(φ)
    pos[3*i+2] = r * z
  }
}
seed()
const geom = new THREE.BufferGeometry()
geom.setAttribute('position', new THREE.BufferAttribute(pos, 3))
const pmat = new THREE.PointsMaterial({color: 0xffcc88, size: 4, sizeAttenuation: false, depthTest: false, depthWrite: false, transparent: true, opacity: 0.95})
const pts = new THREE.Points(geom, pmat)
scene.add(pts)

const ctl = new OrbitControls(cam, rnd.domElement)
ctl.enableDamping = true

const S = {
  L: 3, M: 2, n: 1,
  γ: 0.4, σ: +1,
  axX: 0, axY: 0, axZ: 1, ωrot: 0.3, rotAxis: true,
  gain: 18, STEPS: 128,
  reseed: ()=>{ seed(); geom.attributes.position.needsUpdate = true }
}
const sync = ()=>{
  u.L.value = S.L; u.M.value = S.M
  u.k.value = ALPHA[S.L][S.n-1]
  u.gain.value = S.gain; u.STEPS.value = S.STEPS
}
sync()

const LM = []
for(let L = 0; L <= 5; L++) for(let M = -L; M <= L; M++) LM.push(`${L},${M}`)
const gui = new GUI({title:'∇U tweezing · 3D'})
gui.add({lm:'3,2'}, 'lm', LM).name('(ℓ,m)').onChange(v=>{
  const [l,m] = v.split(',').map(Number); S.L=l; S.M=m; sync()
})
gui.add(S,'n', 1, 3, 1).onChange(sync).name('n radial')
gui.add(S,'γ', 0, 5, 0.01).name('γ (step)')
gui.add(S,'σ', {'+ node':1, '− antinode':-1}).name('σ').onChange(v=>S.σ=+v)
gui.add(S,'ωrot', -2, 2, 0.01).name('ω_rot')
gui.add(S,'rotAxis').name('R(t) on')
gui.add(S,'gain', 0.5, 200, 0.5).onChange(sync)
gui.add(S,'STEPS', 32, 256, 4).onChange(sync)
gui.add(S,'reseed').name('↻ seed')

const hud = document.getElementById('hud')

// scratch
const tmpP = new THREE.Vector3()
const tmpN = new THREE.Vector3()
const tmpG = new THREE.Vector3()
const q = new THREE.Quaternion()
const R4 = new THREE.Matrix4()
const Rm = new THREE.Matrix3()
const RmT = new THREE.Matrix3()

const H = 1e-3
function U(L, M, k, x, y, z){
  const r = Math.hypot(x, y, z)
  if(r < 1e-5) return 0
  const yv = Y(L, M, x/r, y/r, z/r)
  const bv = jL(L, k*r)
  const v = bv * yv
  return v*v
}
function gradU(L, M, k, p, out){
  const U0 = U(L,M,k, p.x, p.y, p.z)
  const Ux = U(L,M,k, p.x+H, p.y,   p.z)
  const Uy = U(L,M,k, p.x,   p.y+H, p.z)
  const Uz = U(L,M,k, p.x,   p.y,   p.z+H)
  out.set((Ux-U0)/H, (Uy-U0)/H, (Uz-U0)/H)
}

let last = performance.now(), t = 0
function loop(){
  const now = performance.now()
  const dt = Math.min(0.05, (now - last) * 1e-3); last = now
  t += dt

  // R(t)
  tmpP.set(S.axX, S.axY, S.axZ); if(tmpP.lengthSq() < 1e-6) tmpP.set(0,0,1)
  tmpP.normalize()
  q.setFromAxisAngle(tmpP, S.rotAxis ? S.ωrot * t : 0)
  R4.makeRotationFromQuaternion(q)
  Rm.setFromMatrix4(R4)
  RmT.copy(Rm).transpose()
  u.Rt.value.copy(RmT)

  const arr = geom.attributes.position.array
  const k = u.k.value
  for(let i = 0; i < N; i++){
    tmpP.set(arr[3*i+0], arr[3*i+1], arr[3*i+2])
    // to mode frame
    tmpN.copy(tmpP).applyMatrix3(RmT)
    gradU(S.L, S.M, k, tmpN, tmpG)
    tmpG.applyMatrix3(Rm)  // back to world frame
    tmpP.addScaledVector(tmpG, -S.σ * S.γ * dt)
    const r = tmpP.length()
    if(r > 1) tmpP.multiplyScalar(1/r)
    arr[3*i+0] = tmpP.x; arr[3*i+1] = tmpP.y; arr[3*i+2] = tmpP.z
  }
  geom.attributes.position.needsUpdate = true

  ctl.update()
  rnd.render(scene, cam)
  hud.textContent =
    `(ℓ,m,n) = (${S.L}, ${S.M}, ${S.n})   k = ${u.k.value.toFixed(3)}\n`+
    `σ = ${S.σ>0?'+node':'−antinode'}   γ = ${S.γ.toFixed(2)}\n`+
    `ω_rot = ${S.ωrot.toFixed(2)}   t = ${t.toFixed(1)}   N = ${N}`
  requestAnimationFrame(loop)
}
loop()
</script>
