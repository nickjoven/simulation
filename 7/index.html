<!doctype html>
<meta charset=utf-8>
<title>Farey trap · ψ_F = Σ K/q² · G(θ−2πp/q)</title>
<style>
  html,body{margin:0;height:100%;background:#000;color:#9cf;font:11px/1.35 ui-monospace,monospace;overflow:hidden}
  #hud{position:fixed;top:8px;left:10px;pointer-events:none;white-space:pre;mix-blend-mode:screen;opacity:.9}
  canvas{display:block}
  .lil-gui{--background-color:#0a0f14;--text-color:#9cf;--title-background-color:#111;--widget-color:#1a2230;--hover-color:#243040;--focus-color:#2d3a4d;--number-color:#cfe;--string-color:#fc9;--font-size:11px;--input-font-size:11px}
</style>
<div id=hud></div>
<script type=importmap>
{"imports":{
  "three":"https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/",
  "lil-gui":"https://unpkg.com/lil-gui@0.19.2/dist/lil-gui.esm.js"
}}
</script>
<script type=module>
import * as THREE from 'three'
import { OrbitControls } from 'three/addons/controls/OrbitControls.js'
import GUI from 'lil-gui'
import {
  VS, FS_PRELUDE, FS_MARCH,
  defaultPalette, bakeFareySum, fareyList, fareyUScalar,
} from '../common.js'

// U(p̂, r) = ψ_F(p̂, r)²                           (ψ_F baked, sampled)
// ψ_F = (1 − n_z²) · Gr(r − r_eq) · Σ_{a/b ∈ F_Q} (K / b²) · Gθ(n̂·ĉ_{a/b})
// ĉ_{a/b} = (cos(2π·a/b), sin(2π·a/b), 0) ; Arnold-tongue weight K/b².
// Dwell → size shows tongue-width scaling : dwell ∝ 1/(γ|∇U|).

const EXTRA = `
uniform sampler3D vol;
uniform mat3 Rt;
`
const PSI = `
vec3 pm = Rt * p;
psi = V(vol, pm);
`
const fs = FS_PRELUDE + FS_MARCH(EXTRA, PSI)

const scene = new THREE.Scene()
const cam = new THREE.PerspectiveCamera(35, innerWidth/innerHeight, .1, 100)
cam.position.set(0, 0, 3.4)
const rnd = new THREE.WebGLRenderer({antialias:true})
rnd.setSize(innerWidth, innerHeight)
rnd.setPixelRatio(Math.min(devicePixelRatio, 2))
document.body.append(rnd.domElement)
addEventListener('resize', ()=>{
  cam.aspect = innerWidth/innerHeight; cam.updateProjectionMatrix()
  rnd.setSize(innerWidth, innerHeight)
})

const u = {
  ...defaultPalette(),
  t:{value:0}, w:{value:0}, gain:{value:12}, STEPS:{value:96},
  vol:{value: null},
  Rt:{value: new THREE.Matrix3()},
}
const mat = new THREE.ShaderMaterial({
  vertexShader: VS, fragmentShader: fs, uniforms: u,
  glslVersion: THREE.GLSL3,
})
const sph = new THREE.Mesh(new THREE.SphereGeometry(1.001, 96, 48), mat)
scene.add(sph)

// particles
const N = 384
const pos = new Float32Array(N * 3)
function seed(){
  for(let i = 0; i < N; i++){
    // concentrate near equator shell
    const r = Math.cbrt(Math.random())
    const z = (2*Math.random() - 1) * 0.4          // narrow band
    const s = Math.sqrt(Math.max(0, 1 - z*z))
    const φ = 2*Math.PI*Math.random()
    pos[3*i+0] = r * s * Math.cos(φ)
    pos[3*i+1] = r * s * Math.sin(φ)
    pos[3*i+2] = r * z
  }
}
seed()
const geom = new THREE.BufferGeometry()
geom.setAttribute('position', new THREE.BufferAttribute(pos, 3))
const col = new Float32Array(N * 3)
for(let i = 0; i < N; i++){ col[3*i]=1; col[3*i+1]=0.8; col[3*i+2]=0.53 }
geom.setAttribute('color', new THREE.BufferAttribute(col, 3))
const dwell = new Float32Array(N)
geom.setAttribute('dwell', new THREE.BufferAttribute(dwell, 1))

const pts_vs = `
in vec3 color;
in float dwell;
out vec3 vColor;
uniform float uBaseSize;
uniform int   uDwellOn;
void main(){
  vColor = color;
  vec4 mv = modelViewMatrix * vec4(position, 1.0);
  gl_Position = projectionMatrix * mv;
  gl_PointSize = (uDwellOn == 1)
    ? uBaseSize * mix(0.35, 2.6, dwell)
    : uBaseSize;
}`
const pts_fs = `
in  vec3 vColor;
out vec4 fragColor;
void main(){ fragColor = vec4(vColor, 0.95); }`

const pmat = new THREE.ShaderMaterial({
  vertexShader: pts_vs, fragmentShader: pts_fs,
  glslVersion: THREE.GLSL3,
  transparent: true, depthTest: false, depthWrite: false,
  uniforms: {
    uBaseSize: { value: 4 },
    uDwellOn:  { value: 1 },
  },
})
const pts = new THREE.Points(geom, pmat)
scene.add(pts)

const ctl = new OrbitControls(cam, rnd.domElement)
ctl.enableDamping = true
ctl.autoRotate = true
ctl.autoRotateSpeed = 0.25

// palettes (shared scheme with demo 5)
const PALETTES = {
  'default':     { pos:[0.25,0.75,1.00], neg:[1.00,0.35,0.45], pt_near:[1.00,0.80,0.53], pt_far:[0.25,0.40,0.90] },
  'dragonfruit': { pos:[1.00,0.18,0.57], neg:[0.42,0.03,0.55], pt_near:[0.65,1.00,0.30], pt_far:[1.00,0.95,0.88] },
  'viridis':     { pos:[0.99,0.91,0.14], neg:[0.27,0.01,0.33], pt_near:[0.99,0.91,0.14], pt_far:[0.13,0.57,0.55] },
  'infrared':    { pos:[1.00,0.55,0.10], neg:[0.35,0.02,0.40], pt_near:[1.00,0.92,0.35], pt_far:[0.60,0.08,0.10] },
  'mono':        { pos:[0.95,0.95,1.00], neg:[0.30,0.30,0.40], pt_near:[1.00,1.00,1.00], pt_far:[0.40,0.45,0.55] },
  'blueprint':   { pos:[0.20,0.65,1.00], neg:[0.75,0.85,1.00], pt_near:[1.00,1.00,1.00], pt_far:[0.10,0.30,0.60] },
  'bloodmoon':   { pos:[1.00,0.15,0.10], neg:[0.35,0.00,0.00], pt_near:[1.00,0.85,0.40], pt_far:[0.20,0.00,0.10] },
}

const S = {
  Q: 6, K: 0.4, sθ: 0.18, sr: 0.10, rEq: 0.70,
  γ: 1.0, σ: -1,             // σ = −1 : antinode trap (seek Farey peaks)
  ωrot: 0, rotAxis: false,
  palette: 'default',
  gain: 12, STEPS: 96, N: 80,
  depthColor: true, dwellOn: true, τmax: 6, baseSize: 4,
  reseed: ()=>{ seed(); geom.attributes.position.needsUpdate = true },
}

let F = fareyList(S.Q)
const rebake = ()=>{
  if(u.vol.value) u.vol.value.dispose()
  u.vol.value = bakeFareySum(S.Q, S.K, S.sθ, S.sr, S.rEq, S.N)
  F = fareyList(S.Q)
}
const applyPalette = ()=>{
  const pl = PALETTES[S.palette]
  u.uColPos.value.fromArray(pl.pos)
  u.uColNeg.value.fromArray(pl.neg)
}
const sync = ()=>{
  u.gain.value = S.gain; u.STEPS.value = S.STEPS
  pmat.uniforms.uBaseSize.value = S.baseSize
  pmat.uniforms.uDwellOn.value = S.dwellOn ? 1 : 0
  applyPalette()
}
rebake(); sync()

const gui = new GUI({title:'Farey trap · ψ_F'})
gui.add(S,'Q', 2, 19, 1).onChange(rebake).name('Q (max denom)')
gui.add(S,'K', 0.05, 2, 0.01).onChange(rebake).name('K (tongue scale)')
gui.add(S,'sθ', 0.05, 0.5, 0.005).onChange(rebake).name('σ_θ')
gui.add(S,'sr', 0.02, 0.3, 0.005).onChange(rebake).name('σ_r')
gui.add(S,'rEq', 0.3, 0.95, 0.01).onChange(rebake).name('r_eq')
gui.add(S,'γ', 0, 20, 0.05).name('γ (step)')
gui.add(S,'σ', {'+ gaps':1, '− Farey peaks':-1}).name('σ').onChange(v=>S.σ=+v)
gui.add(S,'ωrot', -2, 2, 0.01).name('ω_rot')
gui.add(S,'rotAxis').name('R(t) on')
gui.add(S,'palette', Object.keys(PALETTES)).onChange(applyPalette)
gui.add(S,'depthColor').name('depth → color')
gui.add(S,'dwellOn').name('dwell → size').onChange(sync)
gui.add(S,'τmax', 0.5, 30, 0.5).name('τ_max / s')
gui.add(S,'baseSize', 1, 12, 0.5).name('point size').onChange(sync)
gui.add(S,'gain', 0.5, 80, 0.5).onChange(sync)
gui.add(S,'STEPS', 32, 256, 4).onChange(sync)
gui.add(S,'N', 32, 128, 16).name('bake N').onChange(rebake)
gui.add(S,'reseed').name('↻ seed')

const hud = document.getElementById('hud')

const tmpP = new THREE.Vector3()
const tmpN = new THREE.Vector3()
const tmpG = new THREE.Vector3()
const q = new THREE.Quaternion()
const R4 = new THREE.Matrix4()
const Rm = new THREE.Matrix3()
const RmT = new THREE.Matrix3()
const axVec = new THREE.Vector3(0, 0, 1)

const H = 1e-3
function gradFarey(p, out){
  const u0 = fareyUScalar(F, S.K, S.sθ, S.sr, S.rEq, p.x, p.y, p.z)
  const ux = fareyUScalar(F, S.K, S.sθ, S.sr, S.rEq, p.x+H, p.y, p.z)
  const uy = fareyUScalar(F, S.K, S.sθ, S.sr, S.rEq, p.x, p.y+H, p.z)
  const uz = fareyUScalar(F, S.K, S.sθ, S.sr, S.rEq, p.x, p.y, p.z+H)
  out.set((ux-u0)/H, (uy-u0)/H, (uz-u0)/H)
}

let last = performance.now(), t = 0
function loop(){
  const now = performance.now()
  const dt = Math.min(0.05, (now - last) * 1e-3); last = now
  t += dt

  q.setFromAxisAngle(axVec, S.rotAxis ? S.ωrot * t : 0)
  R4.makeRotationFromQuaternion(q)
  Rm.setFromMatrix4(R4)
  RmT.copy(Rm).transpose()
  u.Rt.value.copy(RmT)

  const arr = geom.attributes.position.array
  const τmax = S.τmax
  for(let i = 0; i < N; i++){
    tmpP.set(arr[3*i+0], arr[3*i+1], arr[3*i+2])
    tmpN.copy(tmpP).applyMatrix3(RmT)
    gradFarey(tmpN, tmpG)
    tmpG.applyMatrix3(Rm)
    const gmag = tmpG.length()
    const rate = S.γ * gmag
    const τ = Math.min(τmax, 1 / (rate + 1e-4))
    dwell[i] = τ / τmax
    tmpP.addScaledVector(tmpG, -S.σ * S.γ * dt)
    const r = tmpP.length()
    if(r > 1) tmpP.multiplyScalar(1/r)
    arr[3*i+0] = tmpP.x; arr[3*i+1] = tmpP.y; arr[3*i+2] = tmpP.z
  }
  geom.attributes.position.needsUpdate = true
  geom.attributes.dwell.needsUpdate = true

  // particle colour : depth → colour ; palette pt_near / pt_far
  const pl = PALETTES[S.palette]
  const pn = pl.pt_near, pf = pl.pt_far
  const cx = cam.position.x, cy = cam.position.y, cz = cam.position.z
  const camDist = Math.hypot(cx, cy, cz)
  const d0 = camDist - 1, d1 = camDist + 1
  for(let i = 0; i < N; i++){
    if(S.depthColor){
      const dx = arr[3*i+0] - cx, dy = arr[3*i+1] - cy, dz = arr[3*i+2] - cz
      const d = Math.hypot(dx, dy, dz)
      const tt = Math.min(1, Math.max(0, (d - d0) / (d1 - d0)))
      col[3*i+0] = pn[0] + (pf[0] - pn[0]) * tt
      col[3*i+1] = pn[1] + (pf[1] - pn[1]) * tt
      col[3*i+2] = pn[2] + (pf[2] - pn[2]) * tt
    } else {
      col[3*i+0] = pn[0]; col[3*i+1] = pn[1]; col[3*i+2] = pn[2]
    }
  }
  geom.attributes.color.needsUpdate = true

  ctl.update()
  rnd.render(scene, cam)
  hud.textContent =
    `Q = ${S.Q}   |F_Q| = ${F.length}   K = ${S.K.toFixed(2)}\n`+
    `σ_θ = ${S.sθ.toFixed(3)}   σ_r = ${S.sr.toFixed(3)}   r_eq = ${S.rEq.toFixed(2)}\n`+
    `γ = ${S.γ.toFixed(2)}   σ = ${S.σ>0?'+ gaps':'− Farey peaks'}   N = ${N}\n`+
    `bake = ${S.N}³   STEPS = ${S.STEPS}   τ_max = ${S.τmax.toFixed(1)} s`
  requestAnimationFrame(loop)
}
loop()
</script>
