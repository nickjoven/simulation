<!doctype html>
<meta charset=utf-8>
<title>Chirikov · Greene residue · R_n</title>
<style>
  html,body{margin:0;height:100%;background:#000;color:#9cf;font:11px/1.35 ui-monospace,monospace;overflow:hidden}
  #stage{display:grid;grid-template-columns:1fr 380px;height:100%}
  #phase{position:relative;background:#000}
  #phase canvas{position:absolute;inset:0;width:100%;height:100%}
  #side{border-left:1px solid #1a2230;padding:12px;overflow:auto}
  #hud{white-space:pre;color:#9cf;opacity:.9}
  #resC{display:block;margin-top:10px;background:#050a10;border:1px solid #1a2230}
  table{border-collapse:collapse;margin-top:10px;font-size:10px;width:100%}
  td,th{padding:2px 6px;border-bottom:1px dotted #1a2230;text-align:right}
  th{color:#678;font-weight:400}
  td.S{color:#9cf}   td.ST{color:#fc9}
  .lil-gui{--background-color:#0a0f14;--text-color:#9cf;--title-background-color:#111;--widget-color:#1a2230;--hover-color:#243040;--focus-color:#2d3a4d;--number-color:#cfe;--string-color:#fc9;--font-size:11px;--input-font-size:11px}
</style>
<div id=stage>
  <div id=phase><canvas id=phaseC></canvas></div>
  <div id=side>
    <div id=hud></div>
    <canvas id=resC width=356 height=220></canvas>
    <table id=tbl>
      <thead><tr><th>n</th><th>q</th><th>p_w</th><th>⟨S⟩ R_n</th><th>⟨ST⟩ R_n</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>
<script type=importmap>
{"imports":{
  "lil-gui":"https://unpkg.com/lil-gui@0.19.2/dist/lil-gui.esm.js"
}}
</script>
<script type=module>
import GUI from 'lil-gui'

// Chirikov standard map, area-preserving :
//   p' = p + (K / 2π) sin(2π θ)
//   θ' = θ + p'
//   DT = [[1 + K cos(2π θ), 1], [K cos(2π θ), 1]],   det = 1.
//
// Periodic orbit of period q, winding p_w :
//   T^q(θ, p) − (θ + p_w, p) = 0     solved by damped Newton with adaptive K-continuation.
// Greene residue :  R = (2 − Tr DT^q) / 4.
//
// Two families distinguished by the θ-symmetry line of the Newton seed :
//   ⟨S⟩  : θ₀ = 0      fixed line of involution R₁ : (θ, p) → (−θ, −p)      elliptic branch
//   ⟨ST⟩ : θ₀ = 1/2    fixed line of involution R₂ : (θ, p) → (1−θ, −p)     hyperbolic branch
// These are the two canonical involutions whose product generates the shift ;
// <S>, <ST> are shorthand for the conjugacy classes on PSL(2, ℤ).
//
// At K = K_c ≈ 0.9716354  the golden-mean KAM curve breaks ;
// Greene's criterion :  |R_n| → R_∞ ≈ 0.2500888  iff K = K_c.

const PHI = (1 + Math.sqrt(5)) / 2
const INV_PHI = 1 / PHI
const K_C = 0.9716354
const R_INF = 0.2500888
const TWO_PI = 2 * Math.PI

function fibs(N){
  const F = [1, 1]
  for(let i = 2; i <= N+1; i++) F.push(F[i-1] + F[i-2])
  return F
}
const F = fibs(10)
const LEVELS = []
for(let n = 1; n <= 9; n++) LEVELS.push({ n, q: F[n+1], pW: F[n] })

function Tmap(θ, p, K){
  const pn = p + (K / TWO_PI) * Math.sin(TWO_PI * θ)
  return [θ + pn, pn]
}
function mm(A, B){
  return [
    [A[0][0]*B[0][0] + A[0][1]*B[1][0], A[0][0]*B[0][1] + A[0][1]*B[1][1]],
    [A[1][0]*B[0][0] + A[1][1]*B[1][0], A[1][0]*B[0][1] + A[1][1]*B[1][1]],
  ]
}
function Tq(θ, p, K, q){
  let M = [[1,0],[0,1]], a = θ, b = p
  for(let i = 0; i < q; i++){
    const kc = K * Math.cos(TWO_PI * a)
    M = mm([[1+kc, 1], [kc, 1]], M)
    ;[a, b] = Tmap(a, b, K)
  }
  return [a, b, M]
}

// damped Newton, residual-based exit.  returns { θ, p, Tr, R } or null.
function newton(K, q, pW, seedθ, seedP, maxIt = 150){
  let θ = seedθ, p = seedP
  for(let it = 0; it < maxIt; it++){
    const [a, b, M] = Tq(θ, p, K, q)
    const F1 = a - θ - pW, F2 = b - p
    if(Math.abs(F1) + Math.abs(F2) < 1e-12){
      return { θ, p, Tr: M[0][0] + M[1][1], R: (2 - (M[0][0] + M[1][1])) / 4 }
    }
    const J = [[M[0][0] - 1, M[0][1]], [M[1][0], M[1][1] - 1]]
    const det = J[0][0]*J[1][1] - J[0][1]*J[1][0]
    if(Math.abs(det) < 1e-20) return null
    const dθ = ( J[1][1]*F1 - J[0][1]*F2) / det
    const dp = (-J[1][0]*F1 + J[0][0]*F2) / det
    const step = Math.max(Math.abs(dθ), Math.abs(dp))
    const s = step > 0.25 ? 0.25 / step : 1
    θ -= s * dθ; p -= s * dp
    if(!isFinite(θ) || !isFinite(p)) return null
  }
  return null
}

// adaptive K-continuation from K = 0.  At K = 0 the orbit is (seedθ, pW/q).
function continuation(K, q, pW, seedθ){
  let θ = seedθ, p = pW / q, Kc = 0
  let dK = K * 0.005
  let tries = 0
  while(Kc < K - 1e-10 && tries < 10000){
    const Kn = Math.min(K, Kc + dK)
    const o = newton(Kn, q, pW, θ, p)
    if(o){
      θ = o.θ; p = o.p; Kc = Kn
      if(dK < K * 0.02) dK *= 1.5
    } else {
      dK *= 0.5
      if(dK < K * 1e-8) return null
    }
    tries++
  }
  const [, , M] = Tq(θ, p, K, q)
  return { θ, p, Tr: M[0][0] + M[1][1], R: (2 - (M[0][0] + M[1][1])) / 4 }
}

// --- drawing --------------------------------------------------------------

const phaseC = document.getElementById('phaseC')
const px = phaseC.getContext('2d', { alpha: false })
function fit(){
  const r = phaseC.getBoundingClientRect()
  phaseC.width  = Math.max(200, r.width  | 0)
  phaseC.height = Math.max(200, r.height | 0)
}
fit(); addEventListener('resize', ()=>{ fit(); drawPhase() })

const resC = document.getElementById('resC')
const rx = resC.getContext('2d')

function hueRGB(h, v = 0.20){
  h = ((h % 1) + 1) % 1
  const c = v
  const x = c * (1 - Math.abs(((h * 6) % 2) - 1))
  let r, g, b
  if(h < 1/6){ r=c; g=x; b=0 }
  else if(h < 2/6){ r=x; g=c; b=0 }
  else if(h < 3/6){ r=0; g=c; b=x }
  else if(h < 4/6){ r=0; g=x; b=c }
  else if(h < 5/6){ r=x; g=0; b=c }
  else{ r=c; g=0; b=x }
  return [Math.round(r*255), Math.round(g*255), Math.round(b*255)]
}

function drawPhase(){
  const W = phaseC.width, H = phaseC.height
  px.fillStyle = '#000'; px.fillRect(0, 0, W, H)
  px.strokeStyle = '#0e1820'
  px.beginPath(); px.moveTo(0, H/2); px.lineTo(W, H/2); px.stroke()
  for(let i = 0; i <= 4; i++){
    px.beginPath(); px.moveTo(i*W/4, 0); px.lineTo(i*W/4, H); px.stroke()
  }
  const N = S.ics, M = S.iters
  const pMin = -S.pRange, pMax = S.pRange
  const tox = θ => { let t = θ - Math.floor(θ); return t * W }
  const poy = p => H - (p - pMin) / (pMax - pMin) * H
  const img = px.createImageData(W, H)
  for(let k = 0; k < N; k++){
    let θ = Math.random(), p = pMin + Math.random() * (pMax - pMin)
    const c = hueRGB((k / N + 0.05) % 1)
    for(let i = 0; i < M; i++){
      [θ, p] = Tmap(θ, p, S.K)
      const xi = tox(θ) | 0, yi = poy(p) | 0
      if(xi < 0 || xi >= W || yi < 0 || yi >= H) continue
      const o = (yi * W + xi) * 4
      img.data[o]   = Math.min(255, img.data[o]   + c[0])
      img.data[o+1] = Math.min(255, img.data[o+1] + c[1])
      img.data[o+2] = Math.min(255, img.data[o+2] + c[2])
      img.data[o+3] = 255
    }
  }
  px.putImageData(img, 0, 0)
  // overlay orbit points
  for(const m of S.markers){
    if(!m.orbit) continue
    px.fillStyle = m.colour
    let θ = m.orbit.θ, p = m.orbit.p
    for(let i = 0; i < m.orbit.q; i++){
      px.beginPath(); px.arc(tox(θ), poy(p), 2.5, 0, 2*Math.PI); px.fill()
      ;[θ, p] = Tmap(θ, p, S.K)
    }
  }
  // HUD on phase canvas
  px.fillStyle = '#9cf'; px.font = '11px ui-monospace'
  px.fillText(`K = ${S.K.toFixed(6)}${Math.abs(S.K - K_C) < 1e-4 ? '  ≈ K_c' : ''}`, 10, 16)
}

function drawResidues(rowsS, rowsST){
  const W = resC.width, H = resC.height
  rx.fillStyle = '#050a10'; rx.fillRect(0, 0, W, H)
  rx.strokeStyle = '#1a2230'; rx.strokeRect(.5, .5, W-1, H-1)
  const padL = 28, padR = 14, padT = 10, padB = 18
  const xN = n => padL + (n - 1) * (W - padL - padR) / 8
  const yR = R => padT + (0.8 - R) / 1.6 * (H - padT - padB)   // R ∈ [-0.8, 0.8]
  // grid + R_∞ bands
  rx.strokeStyle = '#1c2a3a'; rx.setLineDash([2, 3])
  for(const v of [-0.5, -0.25, 0, 0.25, 0.5]){
    rx.beginPath(); rx.moveTo(padL, yR(v)); rx.lineTo(W-padR, yR(v)); rx.stroke()
  }
  rx.setLineDash([])
  rx.strokeStyle = '#fc9'; rx.setLineDash([3, 3])
  for(const v of [R_INF, -R_INF]){
    rx.beginPath(); rx.moveTo(padL, yR(v)); rx.lineTo(W-padR, yR(v)); rx.stroke()
  }
  rx.setLineDash([])
  rx.fillStyle = '#fc9'; rx.font = '9px ui-monospace'
  rx.fillText('+R∞', W-padR+2, yR(R_INF)+3)
  rx.fillText('−R∞', W-padR+2, yR(-R_INF)+3)
  rx.fillStyle = '#456'
  for(const v of [-0.5, -0.25, 0, 0.25, 0.5]) rx.fillText(v.toFixed(2), 2, yR(v)+3)
  for(let n = 1; n <= 9; n++) rx.fillText(String(n), xN(n)-3, H-padB+10)
  rx.fillText('n', W-padR+6, H-padB+10)
  rx.fillText('R_n', 2, padT-2)
  function plot(rows, col){
    rx.strokeStyle = col; rx.fillStyle = col; rx.lineWidth = 1
    rx.beginPath(); let start = false
    for(const r of rows){
      if(!r || !isFinite(r.R)) continue
      const xi = xN(r.n), yi = yR(Math.max(-0.8, Math.min(0.8, r.R)))
      if(!start){ rx.moveTo(xi, yi); start = true } else rx.lineTo(xi, yi)
    }
    rx.stroke()
    for(const r of rows){
      if(!r || !isFinite(r.R)) continue
      rx.beginPath(); rx.arc(xN(r.n), yR(Math.max(-0.8, Math.min(0.8, r.R))), 2, 0, 2*Math.PI); rx.fill()
    }
  }
  plot(rowsS,  '#9cf')
  plot(rowsST, '#fc9')
  rx.fillStyle = '#9cf'; rx.fillText('⟨S⟩  θ₀ = 0',   W-130, 12)
  rx.fillStyle = '#fc9'; rx.fillText('⟨ST⟩ θ₀ = 1/2', W-130, 24)
}

// --- state + compute -------------------------------------------------------

const S = {
  K: K_C,
  ics: 28, iters: 600, pRange: 1.0,
  θ_S: 0.0, θ_ST: 0.5,
  markers: [],
  toKc: ()=>{ S.K = K_C; gui.controllersRecursive().forEach(c=>c.updateDisplay()); recompute() },
  run: ()=>{ recompute() },
}

function recompute(){
  const rowsS = [], rowsST = []
  S.markers = []
  for(const L of LEVELS){
    const oS  = continuation(S.K, L.q, L.pW, S.θ_S)
    const oST = continuation(S.K, L.q, L.pW, S.θ_ST)
    rowsS.push(oS  ? { n: L.n, ...oS  } : { n: L.n, R: NaN })
    rowsST.push(oST ? { n: L.n, ...oST } : { n: L.n, R: NaN })
    if(oS)  S.markers.push({ orbit: { θ: oS.θ,  p: oS.p,  q: L.q }, colour: 'rgba(160,200,240,.95)' })
    if(oST) S.markers.push({ orbit: { θ: oST.θ, p: oST.p, q: L.q }, colour: 'rgba(255,200,140,.95)' })
  }
  // HUD text
  document.getElementById('hud').textContent =
    `Chirikov standard map\n`+
    `K = ${S.K.toFixed(6)}   K_c ≈ 0.9716354\n`+
    `R_∞ ≈ ±0.2500888   golden-KAM threshold\n`+
    `⟨S⟩   θ₀ = ${S.θ_S.toFixed(3)}   (elliptic branch)\n`+
    `⟨ST⟩  θ₀ = ${S.θ_ST.toFixed(3)}   (hyperbolic branch)`
  // table
  const tbody = document.querySelector('#tbl tbody')
  tbody.innerHTML = ''
  for(let i = 0; i < LEVELS.length; i++){
    const L = LEVELS[i]
    const rS = rowsS[i], rST = rowsST[i]
    const tr = document.createElement('tr')
    tr.innerHTML =
      `<td>${L.n}</td><td>${L.q}</td><td>${L.pW}</td>`+
      `<td class=S>${rS.R != null && isFinite(rS.R) ? rS.R.toFixed(4) : '—'}</td>`+
      `<td class=ST>${rST.R != null && isFinite(rST.R) ? rST.R.toFixed(4) : '—'}</td>`
    tbody.appendChild(tr)
  }
  drawResidues(rowsS, rowsST)
  drawPhase()
}

const gui = new GUI({title:'Chirikov · R_n'})
gui.add(S,'K', 0, 2, 0.0001).onChange(recompute)
gui.add(S,'toKc').name('K → K_c')
gui.add(S,'θ_S',  0, 1, 0.001).onChange(recompute).name('⟨S⟩ θ₀')
gui.add(S,'θ_ST', 0, 1, 0.001).onChange(recompute).name('⟨ST⟩ θ₀')
gui.add(S,'ics',  4, 96, 1).onChange(drawPhase).name('# trajectories')
gui.add(S,'iters', 100, 3000, 50).onChange(drawPhase).name('iter / IC')
gui.add(S,'pRange', 0.3, 2.0, 0.05).onChange(drawPhase).name('p window')
gui.add(S,'run').name('recompute')

recompute()
</script>
