<!doctype html>
<meta charset=utf-8>
<title>L → EL → Noether → integers · Kuramoto-Z₆ walkthrough</title>
<style>
  html,body{margin:0;height:100%;background:#000;color:#9cf;font:11px/1.4 ui-monospace,monospace;overflow:hidden}
  #stage{display:grid;grid-template-columns:1fr 460px;height:100%}

  #left canvas{position:absolute;inset:0;width:100%;height:100%}

<div id=stage>
  <div id=left><canvas id=ringC></canvas></div>
  <div id=side>

    <div id=step3 class=step><h3>Step 3 · Discrete-Noether — Z₆ × Z₂ Klein</h3><div class=body id=body3></div></div>
    <div id=step4 class=step><h3>Step 4 · Compactness  S¹ × Γ₀(6)  ⇒  integers</h3><div class=body id=body4></div></div>

<script type=importmap>

<script type=module>
import GUI from 'lil-gui'

// =========================================================================
// L  →  EL  →  Noether  →  compactness  →  integers  →  closure
// =========================================================================
//
// The framework expressed as a Lagrangian system, six steps:
//
//   Step 0.  L(φ, φ̇) = ½ I Σ_k φ̇_k²  −  K Σ_⟨j,k⟩ (1 − cos(φ_j − φ_k))
//            φ_k ∈ S¹,  k ∈ Z₆ = Z₂ × Z₃,  Klein τ: k → −k (mod 6).
//
//   Step 1.  Euler–Lagrange   ⇒
//            I φ̈_k = −K Σ_j sin(φ_k − φ_j)               (Kuramoto)
//
//   Step 2.  Noether (continuous symmetries):
//              U(1) phase shift φ → φ + α    ⇒  Q = Σ I φ̇_k
//              time translation              ⇒  energy
//              spatial translation           ⇒  momentum
//
//   Step 3.  Discrete-Noether (the framework's discrete structure):
//              Z₆ cyclic k → k+1             ⇒  6 sector charges
//              Klein τ k → −k                 ⇒  ψ₊ ⊕ ψ₋ split
//                                                fixed {0,3}; pairs {1,5},{2,4}
//
//   Step 4.  Compactness:
//              S¹ per oscillator              ⇒  windings  n_k ∈ ℤ
//              T² rational ratios p/q          ⇒  |F_n| (Farey count)
//              Γ₀(6) on (p,q)                  ⇒  cusps {∞, 0, 1/2, 1/3}
//              cusp 1/p ↔ trivial Z_p rep    (Hecke; structural Lemma 6)
//              ground state at cusp 1/q       ⇒  w₊ = (q − 1)/q
//
//   Step 5.  Closure (Lemmas 1, 2, 4, 5):
//              ψ₊(1,5) → cusp 1/2 → w₊ = 13/14,  w₋ = 1
//              (Ω_b, Ω_DM, Ω_Λ) = (w₊, 5, 12 + w₊) / (17 + 2w₊)
//                              = (13, 70, 181) / 264

const N = 6                       // |Z₆|
const TWO_PI = 2 * Math.PI
const KLEIN = i => (6 - i) % 6   // antipodal involution
const KLEIN_FIXED = [0, 3]
const KLEIN_PAIRS = [[1, 5], [2, 4]]

// --- state ---------------------------------------------------------------

const S = {
  K: 1.0,                         // coupling
  I: 1.0,                         // inertia
  ωspread: 0.4,                   // natural-frequency spread
  damping: 0.05,                  // tiny damping so motion settles
  speed: 1.0,                     // time speed
  showWindings: true,
  showCharges: true,
  reseed: ()=>seed(),
}

let φ, φ̇, ω
function seed(){
  φ  = new Float64Array(N)
  φ̇  = new Float64Array(N)
  ω  = new Float64Array(N)
  // Klein-symmetric natural-frequency draw : ω_k + ω_{-k} symmetric
  for(let k = 0; k < N; k++){
    φ[k] = TWO_PI * Math.random()
    ω[k] = (k - (N - 1)/2) * S.ωspread / N
  }
  // make pairs identical so the Klein-symmetric component is exact at t=0
  for(const [a, b] of KLEIN_PAIRS) ω[b] = ω[a]
}
seed()

// --- Kuramoto (overdamped form for stability) ----------------------------
// φ̇_k = ω_k + (K/N) Σ sin(φ_j − φ_k)
function step(dt){
  const dφ = new Float64Array(N)
  for(let k = 0; k < N; k++){
    let s = 0
    for(let j = 0; j < N; j++){
      if(j === k) continue
      s += Math.sin(φ[j] - φ[k])
    }
    dφ[k] = ω[k] + (S.K / N) * s
  }
  for(let k = 0; k < N; k++){
    φ̇[k] = (1 - S.damping) * φ̇[k] + dφ[k] * dt
    φ[k] += φ̇[k] * dt
    while(φ[k] >  Math.PI) φ[k] -= TWO_PI
    while(φ[k] < -Math.PI) φ[k] += TWO_PI
  }
}

// --- conserved & symmetry-resolved quantities ----------------------------
// Continuous : U(1) charge  Q = Σ I φ̇_k        (Noether for global phase)
function chargeQ(){
  let q = 0
  for(let k = 0; k < N; k++) q += S.I * φ̇[k]
  return q
}
// Z₆ Fourier resolution :  R_n = (1/N) Σ_k exp(i 2π n k / N) · exp(i φ_k)
//   |R_n| ∈ [0, 1], n = 0..N-1.  R_0 = Kuramoto order parameter.
function fourierR(n){
  let cr = 0, ci = 0
  for(let k = 0; k < N; k++){
    const a = TWO_PI * n * k / N + φ[k]
    cr += Math.cos(a); ci += Math.sin(a)
  }
  return Math.hypot(cr, ci) / N
}
// Klein-antipodal sym / antisym amplitudes
//   sym_k = (φ_k + φ_{N-k}) / 2,  antisym_k = (φ_k − φ_{N-k}) / 2 mod 2π
//   energy in each sector = Σ |sym|², Σ |antisym|²
function kleinSplit(){
  let Esym = 0, Eanti = 0
  for(const [a, b] of KLEIN_PAIRS){
    const s = (φ[a] + φ[b]) / 2
    let d = (φ[a] - φ[b]) / 2
    while(d >  Math.PI/2) d -= Math.PI
    while(d < -Math.PI/2) d += Math.PI
    Esym  += s * s
    Eanti += d * d
  }
  return { sym: Esym, anti: Eanti }
}
// Winding numbers : we count zero crossings on a tracked-trajectory basis
//   n_k = floor of cumulative phase / 2π
const wind = new Int32Array(N)
const φprev = new Float64Array(N)
function updateWindings(){
  for(let k = 0; k < N; k++){
    if(φ[k] - φprev[k] < -Math.PI) wind[k]++
    if(φ[k] - φprev[k] >  Math.PI) wind[k]--
    φprev[k] = φ[k]
  }
}

// --- canvas / drawing ----------------------------------------------------

const C = document.getElementById('ringC')
const ctx = C.getContext('2d', { alpha:false })
function fit(){
  const r = C.getBoundingClientRect()
  C.width  = Math.max(200, r.width  | 0)
  C.height = Math.max(200, r.height | 0)
}
fit(); addEventListener('resize', ()=>{ fit() })

const KLEIN_COL = {
  '0': '#cfe', '3': '#cfe',         // fixed points
  '1': '#9fc', '5': '#9fc',         // pair {1,5}
  '2': '#fc9', '4': '#fc9',         // pair {2,4}
}

function draw(){
  const W = C.width, H = C.height
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H)

  const cx = W * 0.5, cy = H * 0.55
  const R0 = Math.min(W, H) * 0.32

  // outer ring
  ctx.strokeStyle = '#1a2230'
  ctx.lineWidth = 1
  ctx.beginPath(); ctx.arc(cx, cy, R0, 0, TWO_PI); ctx.stroke()

  // Klein-antipodal pair connectors
  ctx.strokeStyle = '#2a3040'
  ctx.setLineDash([2, 4])
  for(const [a, b] of KLEIN_PAIRS){
    const θa = TWO_PI * a / N, θb = TWO_PI * b / N
    ctx.beginPath()
    ctx.moveTo(cx + R0 * Math.cos(θa), cy + R0 * Math.sin(θa))
    ctx.lineTo(cx + R0 * Math.cos(θb), cy + R0 * Math.sin(θb))
    ctx.stroke()
  }
  ctx.setLineDash([])

  // oscillator dots, with phase indicator
  for(let k = 0; k < N; k++){
    const θ = TWO_PI * k / N - Math.PI/2
    const x = cx + R0 * Math.cos(θ)
    const y = cy + R0 * Math.sin(θ)

    // phase pointer : small arrow at angle φ[k]
    const fx = x + 18 * Math.cos(φ[k])
    const fy = y + 18 * Math.sin(φ[k])
    ctx.strokeStyle = KLEIN_COL[String(k)] || '#9cf'
    ctx.lineWidth = 2
    ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(fx, fy); ctx.stroke()

    // dot
    ctx.fillStyle = KLEIN_COL[String(k)] || '#9cf'
    ctx.beginPath(); ctx.arc(x, y, 5, 0, TWO_PI); ctx.fill()

    // label
    ctx.fillStyle = '#cfe'
    ctx.font = '10px ui-monospace'
    ctx.textAlign = 'center'
    ctx.textBaseline = 'middle'
    const lr = R0 + 22
    ctx.fillText(`k=${k}`, cx + lr * Math.cos(θ), cy + lr * Math.sin(θ))
    if(S.showWindings){
      ctx.fillStyle = '#678'
      ctx.fillText(`n=${wind[k]}`, cx + (lr + 14) * Math.cos(θ), cy + (lr + 14) * Math.sin(θ))
    }
  }

  // centre : Kuramoto order parameter |R_0|
  const r = fourierR(0)
  ctx.fillStyle = '#fc9'
  ctx.font = 'bold 14px ui-monospace'
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle'
  ctx.fillText(`|R₀|=${r.toFixed(3)}`, cx, cy)
  ctx.fillStyle = '#678'
  ctx.font = '10px ui-monospace'
  ctx.fillText('Z₆ × S¹', cx, cy + 18)

  // header
  ctx.fillStyle = '#9cf'; ctx.textAlign = 'left'
  ctx.font = '11px ui-monospace'
  ctx.fillText('Kuramoto on Z₆ — Klein-antipodal pairs linked', 12, 18)
  ctx.fillStyle = '#678'
  ctx.fillText('fixed {0,3}   pair {1,5}   pair {2,4}', 12, 32)

  // charge bars at bottom
  if(S.showCharges){
    const baseY = H - 90
    drawBar(12, baseY,      W - 24, 14, 'U(1) charge  Q = Σ I φ̇',  chargeQ() / 4, '#9cf')
    const k = kleinSplit()
    const tot = (k.sym + k.anti) || 1
    drawBar(12, baseY + 22, W - 24, 14, 'Klein sym  ψ₊  (Ω_DM-like)', k.sym  / tot, '#fc9')
    drawBar(12, baseY + 44, W - 24, 14, 'Klein anti ψ₋  (Ω_b -like)', k.anti / tot, '#9fc')
    // Z₆ Fourier resolution row
    ctx.fillStyle = '#678'; ctx.fillText('Z₆ Fourier  |R_n|, n=0..5', 12, baseY + 70)
    const bw = (W - 24) / N
    for(let n = 0; n < N; n++){
      const v = fourierR(n)
      const x = 12 + n * bw + 2
      const y = baseY + 76
      ctx.fillStyle = '#1a2230'; ctx.fillRect(x, y, bw - 4, 10)
      ctx.fillStyle = n === 0 ? '#fc9' : '#9cf'
      ctx.fillRect(x, y, (bw - 4) * v, 10)
      ctx.fillStyle = '#678'; ctx.font = '9px ui-monospace'; ctx.textAlign = 'center'
      ctx.fillText(String(n), x + (bw - 4)/2, y + 22)
    }
  }
}

function drawBar(x, y, w, h, label, frac, col){
  ctx.fillStyle = '#678'
  ctx.font = '10px ui-monospace'; ctx.textAlign = 'left'
  ctx.fillText(label, x, y - 2)
  ctx.fillStyle = '#1a2230'; ctx.fillRect(x, y, w, h)
  const f = Math.max(-1, Math.min(1, frac))
  if(f >= 0){
    ctx.fillStyle = col; ctx.fillRect(x + w/2, y, (w/2) * f, h)
  } else {
    ctx.fillStyle = col; ctx.fillRect(x + w/2 + (w/2) * f, y, -(w/2) * f, h)
  }
  ctx.strokeStyle = '#2a3040'; ctx.beginPath(); ctx.moveTo(x + w/2, y); ctx.lineTo(x + w/2, y + h); ctx.stroke()
  ctx.fillStyle = '#cfe'; ctx.textAlign = 'right'
  ctx.fillText(f.toFixed(3), x + w - 4, y + h - 3)
}

// --- side panel content (static + live) ---------------------------------

document.getElementById('body0').textContent =
  `L(φ, φ̇) = ½ I Σ_k φ̇_k²  −  K Σ_⟨j,k⟩ (1 − cos(φ_j − φ_k))\n`+
  `\n`+
  `φ_k ∈ S¹,   k ∈ Z₆ = Z_{q₂} × Z_{q₃} = Z₂ × Z₃\n`+
  `Klein-antipodal involution  τ: k → −k (mod 6)\n`+
  `\n`+
  `Add Stribeck Rayleigh dissipation  R(φ̇) = Σ μ_{jk} f_S(φ̇_j − φ̇_k)\n`+
  `with velocity-weakening f_S' < 0  ⇒  saddle-node parabola x² + μ = 0.`

document.getElementById('body1').textContent =
  `δS/δφ_k = 0  ⇒  I φ̈_k  =  −K Σ_j sin(φ_k − φ_j)\n`+
  `                          ─────────────────────────\n`+
  `                          Kuramoto equation  (animated → left)\n`+
  `\n`+
  `Continuum  k → x ∈ ℝᵈ:\n`+
  `   K = 1 :   ∂_t² φ = c² ∇²φ − V'(φ)        Einstein-like\n`+
  `   K < 1 :   i ∂_t ψ = −½ ∇²ψ + V ψ          Schrödinger-like\n`+
  `\n`+
  `The K = 1 ↔ K < 1 non-smooth split is Lemma 3:\n`+
  `   two regimes ⇒ two anchors  (H₀, v_EW).`

const body2 = document.getElementById('body2')
const body3 = document.getElementById('body3')

document.getElementById('body4').textContent =
  `Per oscillator  φ_k ∈ S¹  is compact   ⇒  winding  n_k ∈ ℤ      [Born exponent = 2]\n`+
  `T²-pair  rational ratio  Ω = p/q       ⇒  |F_n| = 1 + Σ φ(k)\n`+
  `   |F_4|=7   |F_5|=11   |F_6|=13   |F_7|=19\n`+
  `\n`+
  `Γ₀(6) acting on (p, q)  ⇒  4 cusps  {∞, 0, 1/2, 1/3}\n`+
  `Hecke:  cusp 1/p   ↔   trivial Z_p rep             (Lemma 6)\n`+
  `Ground state at cusp 1/q :   w₊ = (q − 1) / q\n`+
  `\n`+
  `Matter sector closure (Lemma 5):\n`+
  `   M_DM = (|F₇| − N_DM) / q₂ = (19 − 5) / 2 = 7\n`+
  `   q     = q₂ · M_DM           = 2 · 7      = 14\n`+
  `   w₊    = 13 / 14`

document.getElementById('body5').textContent =
  `(Ω_b, Ω_DM, Ω_Λ)  =  (w₊, 5, 12 + w₊) / (17 + 2 w₊)\n`+
  `                  =  (13, 70, 181) / 264\n`+
  `\n`+
  `Single-w reference (Lemma 4)            : (1, 5, 13) / 19\n`+
  `Two-component closure (Lemmas 1, 2, 5)  : (13, 70, 181) / 264\n`+
  `\n`+
  `Sum :  13/264 + 70/264 + 181/264 = 1   exactly\n`+
  `Match: Ω_b 0.12% · Ω_DM 0.06% · Ω_Λ 0.13%   on Planck '18.\n`+
  `\n`+
  `One Lagrangian.  Six steps.  Three observables.  Zero free parameters.`

// --- highlight which step is currently relevant on screen ---------------
const STEP_DIVS = [0,1,2,3,4,5].map(i => document.getElementById('step' + i))

function setActive(i){
  STEP_DIVS.forEach((d, j) => d.classList.toggle('cur', j === i))
}

// --- GUI ----------------------------------------------------------------
const gui = new GUI({ title:'L → EL → Noether → integers' })
gui.add(S,'K', 0, 2, 0.01).name('K (coupling)')
gui.add(S,'I', 0.2, 3, 0.01).name('I (inertia)')
gui.add(S,'ωspread', 0, 1, 0.01).name('ω spread').onChange(seed)
gui.add(S,'damping', 0, 0.2, 0.005).name('damp')
gui.add(S,'speed', 0.1, 4, 0.1).name('speed')
gui.add(S,'showWindings').name('show winding n_k')
gui.add(S,'showCharges').name('show conserved bars')
gui.add(S,'reseed').name('↻ seed')

// --- main loop ----------------------------------------------------------
let last = performance.now(), tWalk = 0
const STEP_DUR = 4   // seconds per step in the auto-walk
function loop(){
  const now = performance.now()
  const dt = Math.min(0.05, (now - last) * 1e-3) * S.speed; last = now
  step(dt)
  updateWindings()

  // live updates to step 2/3 panels
  body2.textContent =
    `(a) Global phase  φ → φ + α   (continuous U(1)) :\n`+
    `       conserved  Q = Σ I φ̇_k = ${chargeQ().toFixed(4)}\n`+
    `(b) Time translation  t → t + ε :\n`+
    `       conserved  energy  E = ½ I Σ φ̇²  + V\n`+
    `(c) Spatial translation  x → x + a  (continuum) :\n`+
    `       conserved  momentum  P = I Σ φ̇_k ∇φ_k\n`+
    `\n`+
    `[textbook example]\n`+
    `   S¹ rotational symmetry  →  conserved L  →  L_z = m ℏ\n`+
    `   here:  S¹ × Z₆           →  conserved windings  →  Farey labels.`

  const k = kleinSplit()
  const tot = (k.sym + k.anti) || 1
  body3.textContent =
    `(d) Z₆ cyclic shift  k → k+1 :\n`+
    `       6 sector charges (gauge Z₆).  |R_n| bars on the left.\n`+
    `(e) Klein-antipodal involution  τ: k → −k (mod 6) :\n`+
    `       fixed {0, 3}     pairs {1, 5}, {2, 4}\n`+
    `       sym  ψ₊ energy = ${k.sym.toFixed(3)}   (${(100*k.sym/tot).toFixed(1)}% — DM-like)\n`+
    `       anti ψ₋ energy = ${k.anti.toFixed(3)}   (${(100*k.anti/tot).toFixed(1)}% — b-like)\n`+
    `\n`+
    `Total winding  Σ n_k = ${Array.from(wind).reduce((a,b)=>a+b,0)}    (compact-S¹ integer charge)`

  // auto-walk highlight
  tWalk += dt
  const cur = Math.floor(tWalk / STEP_DUR) % 6
  setActive(cur)

  draw()
  requestAnimationFrame(loop)
}
loop()
</script>
