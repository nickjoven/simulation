<!doctype html>
<meta charset=utf-8>
<title>gears · 264 / 14 · w₊ = 13/14 · Antikythera handshake</title>
<style>
  html,body{margin:0;height:100%;background:#000;color:#9cf;font:11px/1.4 ui-monospace,monospace;overflow:hidden}
  #stage{display:grid;grid-template-columns:1fr 360px;height:100%}
  #scene{position:relative;background:#000}
  #scene canvas{position:absolute;inset:0;width:100%;height:100%}
  #side{border-left:1px solid #1a2230;padding:10px;overflow:auto}
  .panel{margin:0 0 10px;padding:8px;background:#050a10;border:1px solid #1a2230;border-radius:2px}
  .panel h3{margin:0 0 6px;color:#cfe;font:11px/1.3 ui-monospace,monospace;font-weight:400}
  .panel .body{white-space:pre;color:#9cf}
  .lil-gui{--background-color:#0a0f14;--text-color:#9cf;--title-background-color:#111;--widget-color:#1a2230;--hover-color:#243040;--focus-color:#2d3a4d;--number-color:#cfe;--string-color:#fc9;--font-size:11px;--input-font-size:11px}
</style>
<div id=stage>
  <div id=scene><canvas id=geC></canvas></div>
  <div id=side>
    <div class=panel><h3>gear train</h3><div class=body id=p0></div></div>
    <div class=panel><h3>rigidity sweep</h3><div class=body id=p1></div></div>
    <div class=panel><h3>output ratios</h3><div class=body id=p2></div></div>
    <div class=panel><h3>handshake</h3><div class=body id=p3></div></div>
  </div>
</div>
<script type=importmap>

<script type=module>
import GUI from 'lil-gui'

// =========================================================================
// Gear-train handshake : the K → ∞ rigid-tooth limit of demo 10's Kuramoto.
//
//   big wheel    264 teeth   painted  181 (Ω_Λ)  +  70 (Ω_DM)  +  13 (Ω_b)
//   selector     14 teeth    cusp 1/2 ground state ; tooth #13 marked
//                                                      = w₊ = 13/14
//   Klein twin    2 teeth    on selector shaft ; counter-rotates (q₂ = 2)
//
//   rigidity 1.0 :  hard triangular teeth         (gears, K = ∞)
//   rigidity 0.5 :  Gaussian tongues  K/q² wide   (Arnold tongues, K ≈ 1)
//   rigidity 0.0 :  smooth field — no teeth       (Kuramoto, K = 0)
//
// Same content as demo 10, mechanical aesthetic.
// =========================================================================

const TWO_PI = 2 * Math.PI

const C = document.getElementById('geC')
const ctx = C.getContext('2d', { alpha:false })
function fit(){
  const r = C.getBoundingClientRect()
  C.width  = Math.max(200, r.width  | 0)
  C.height = Math.max(200, r.height | 0)
}
fit(); addEventListener('resize', ()=>{ fit() })

const S = {
  rigidity: 1.0,           // 1 = gears, 0.5 = tongues, 0 = smooth
  speed: 0.5,              // angular speed of the big wheel (rad/s)
  ratioMode: 'kinematic',  // kinematic : ω_sel/ω_big = 264/14
                           // closure   : both spin together (decorative)
  showKlein: true,
  showCusps: true,
  paused: false,
}

let θ_big = 0, θ_sel = 0

// painting the 264-tooth wheel : sectors 181 + 70 + 13 = 264
function paintBig(i){
  if(i < 181) return { fill:'#1a3550', edge:'#9cf' }     // Ω_Λ
  if(i < 251) return { fill:'#502a14', edge:'#fc9' }     // Ω_DM (181..250 = 70 teeth)
  return { fill:'#103e2c', edge:'#9fc' }                  // Ω_b  (251..263 = 13 teeth)
}

// tooth profile : as rigidity drops, sharp triangle → Gaussian → flat
//   f ∈ [-0.5, 0.5] is fractional position within one tooth slot
function profile(rig, f){
  if(rig <= 0) return 0
  const triangle = Math.max(0, 1 - 2 * Math.abs(f))
  const gauss    = Math.exp(-12 * f * f)
  // crossfade : rigidity 1.0 → triangle, rigidity 0.5 → gauss, rigidity 0 → 0
  if(rig >= 0.5){
    const t = (rig - 0.5) * 2          // 0 → gauss, 1 → triangle
    return t * triangle + (1 - t) * gauss
  } else {
    const t = rig * 2                  // 0 → 0, 1 → gauss
    return t * gauss
  }
}

function drawWheel(cx, cy, R, nTeeth, toothH, rotation, paintFn, opts = {}){
  const rig = S.rigidity
  // Radial sector fills (always visible — these are the painted regions)
  for(let i = 0; i < nTeeth; i++){
    const a0 = rotation + TWO_PI * i / nTeeth
    const a1 = rotation + TWO_PI * (i + 1) / nTeeth
    const p = paintFn(i)
    ctx.beginPath()
    ctx.moveTo(cx + (R - 14) * Math.cos(a0), cy + (R - 14) * Math.sin(a0))
    ctx.arc(cx, cy, R, a0, a1, false)
    ctx.arc(cx, cy, R - 14, a1, a0, true)
    ctx.closePath()
    ctx.fillStyle = p.fill
    ctx.fill()
  }

  // Teeth on the rim (rigidity-dependent)
  if(rig > 0.02 && nTeeth <= 400){
    const segs = Math.max(2, Math.floor(8 - 6 * rig))   // rigid → 2 segs/tooth (sharp)
    ctx.beginPath()
    let firstPt = true
    for(let i = 0; i < nTeeth; i++){
      for(let k = 0; k < segs; k++){
        const f = (k / segs) - 0.5
        const a = rotation + TWO_PI * (i + k / segs) / nTeeth
        const r = R + toothH * profile(rig, f)
        const x = cx + r * Math.cos(a), y = cy + r * Math.sin(a)
        if(firstPt){ ctx.moveTo(x, y); firstPt = false } else ctx.lineTo(x, y)
      }
    }
    ctx.closePath()
    ctx.strokeStyle = opts.outline || 'rgba(180,210,240,.35)'
    ctx.lineWidth = 1
    ctx.stroke()
  } else {
    // smooth ring at rigidity = 0
    ctx.beginPath()
    ctx.arc(cx, cy, R, 0, TWO_PI)
    ctx.strokeStyle = opts.outline || 'rgba(180,210,240,.35)'
    ctx.lineWidth = 1
    ctx.stroke()
  }

  // optional marked tooth
  if(opts.markedTooth != null && rig > 0.05){
    const i = opts.markedTooth
    const a = rotation + TWO_PI * (i + 0.5) / nTeeth
    const x = cx + (R + toothH * 1.6) * Math.cos(a)
    const y = cy + (R + toothH * 1.6) * Math.sin(a)
    ctx.fillStyle = '#fc9'
    ctx.beginPath(); ctx.arc(x, y, 4, 0, TWO_PI); ctx.fill()
    ctx.fillStyle = '#fc9'; ctx.font = '10px ui-monospace'
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle'
    ctx.fillText('w₊', cx + (R + toothH * 3.2) * Math.cos(a), cy + (R + toothH * 3.2) * Math.sin(a))
  }

  // sector labels for the big wheel
  if(opts.sectorLabels){
    const labels = [
      { name:'Ω_Λ',  count:181, start:0,   col:'#9cf' },
      { name:'Ω_DM', count:70,  start:181, col:'#fc9' },
      { name:'Ω_b',  count:13,  start:251, col:'#9fc' },
    ]
    for(const L of labels){
      const am = rotation + TWO_PI * (L.start + L.count / 2) / nTeeth
      const lr = R - 28
      ctx.fillStyle = L.col
      ctx.font = 'bold 11px ui-monospace'
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle'
      ctx.fillText(L.name, cx + lr * Math.cos(am), cy + lr * Math.sin(am))
      ctx.fillStyle = '#cfe'
      ctx.font = '10px ui-monospace'
      ctx.fillText(`${L.count}/264`, cx + (lr - 12) * Math.cos(am), cy + (lr - 12) * Math.sin(am))
    }
  }
}

// Klein-antipodal twin : a small Z₂ rotor that counter-rotates with selector
function drawKleinTwin(cx, cy, R, rotation){
  // 2 teeth, 180° apart
  for(let i = 0; i < 2; i++){
    const a = rotation + Math.PI * i
    const x = cx + R * Math.cos(a)
    const y = cy + R * Math.sin(a)
    ctx.fillStyle = i === 0 ? '#9fc' : '#fc9'
    ctx.strokeStyle = 'rgba(255,255,255,.5)'
    ctx.lineWidth = 1
    ctx.beginPath(); ctx.arc(x, y, 5, 0, TWO_PI); ctx.fill(); ctx.stroke()
  }
  // dotted ring
  ctx.strokeStyle = 'rgba(150,170,200,.25)'
  ctx.setLineDash([2, 4]); ctx.lineWidth = 1
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, TWO_PI); ctx.stroke()
  ctx.setLineDash([])
  ctx.fillStyle = '#678'
  ctx.font = '9px ui-monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'
  ctx.fillText('Klein τ', cx, cy - R - 8)
  ctx.fillText('q₂ = 2', cx, cy - R - 18)
}

// Γ₀(6) cusp markers around the big wheel
function drawCuspMarkers(cx, cy, R){
  const cusps = [
    { f: 0,    label:'0',   sub:'(triv Z₂∩Z₃)' },
    { f: 1/3,  label:'1/3', sub:'(triv Z₃)'    },
    { f: 1/2,  label:'1/2', sub:'ψ₊(1,5)'      , active:true },
    { f: 1,    label:'∞',   sub:'(sign rep)'   },
  ]
  for(const c of cusps){
    const a = -Math.PI/2 + c.f * TWO_PI                      // place around top
    const x = cx + (R + 32) * Math.cos(a)
    const y = cy + (R + 32) * Math.sin(a)
    ctx.fillStyle = c.active ? '#fc9' : '#456'
    ctx.beginPath(); ctx.arc(x, y, c.active ? 5 : 3, 0, TWO_PI); ctx.fill()
    ctx.fillStyle = c.active ? '#fc9' : '#9cf'
    ctx.font = c.active ? 'bold 10px ui-monospace' : '10px ui-monospace'
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle'
    const lr2 = R + 50
    ctx.fillText(c.label, cx + lr2 * Math.cos(a), cy + lr2 * Math.sin(a))
    ctx.fillStyle = c.active ? '#fc9' : '#456'
    ctx.font = '9px ui-monospace'
    ctx.fillText(c.sub, cx + (lr2 + 12) * Math.cos(a), cy + (lr2 + 12) * Math.sin(a))
  }
}

function draw(){
  const W = C.width, H = C.height
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H)

  // big wheel — center, large
  const cxBig = W * 0.42, cyBig = H * 0.5
  const Rbig  = Math.min(W, H) * 0.36
  drawWheel(cxBig, cyBig, Rbig, 264, 8, θ_big, paintBig, { sectorLabels:true })

  if(S.showCusps) drawCuspMarkers(cxBig, cyBig, Rbig)

  // selector — to the right, smaller
  const cxSel = Math.min(W * 0.82, cxBig + Rbig + 90)
  const cySel = cyBig
  const Rsel  = Math.min(W, H) * 0.14
  // Selector paint : tooth 13 (= q-1) is the marked ground-state tooth
  const paintSel = i => i === 13 ? { fill:'#503020', edge:'#fc9' } : { fill:'#1a2230', edge:'#9cf' }
  drawWheel(cxSel, cySel, Rsel, 14, 10, θ_sel, paintSel, {
    markedTooth: 13,
    outline: 'rgba(255,200,150,.6)',
  })

  // Klein twin — small, just below selector axis
  if(S.showKlein){
    drawKleinTwin(cxSel, cySel + Rsel + 36, Rsel * 0.45, -θ_sel * 7)
  }

  // axis labels
  ctx.fillStyle = '#cfe'
  ctx.font = '11px ui-monospace'
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle'
  ctx.fillText('264 teeth', cxBig, cyBig + Rbig + 24)
  ctx.fillStyle = '#678'
  ctx.font = '10px ui-monospace'
  ctx.fillText('= 181 + 70 + 13', cxBig, cyBig + Rbig + 38)

  ctx.fillStyle = '#cfe'
  ctx.font = '11px ui-monospace'
  ctx.fillText('14 teeth', cxSel, cySel + Rsel + 18)
  ctx.fillStyle = '#fc9'
  ctx.fillText('w₊ = 13/14', cxSel, cySel + Rsel + 32)

  // header
  ctx.fillStyle = '#9cf'
  ctx.font = '12px ui-monospace'; ctx.textAlign = 'left'
  ctx.fillText('mechanical realisation : ratios as tooth counts', 12, 18)
  ctx.fillStyle = '#678'
  ctx.font = '10px ui-monospace'
  ctx.fillText(`rigidity = ${S.rigidity.toFixed(2)}   ${labelRig(S.rigidity)}`, 12, 34)
}

function labelRig(r){
  if(r > 0.85) return 'rigid teeth  (gears, K → ∞)'
  if(r > 0.55) return 'soft teeth   (intermediate)'
  if(r > 0.25) return 'Arnold tongues  (K ≈ 1, partial lock)'
  if(r > 0.02) return 'shallow modulation  (K → 0⁺)'
  return 'smooth Kuramoto field  (K = 0)'
}

// --- info panels --------------------------------------------------------

function setPanels(){
  document.getElementById('p0').textContent =
    `big wheel   264 teeth   = 181 + 70 + 13\n`+
    `             = q₂³ · q₃ · |F₅|       = 8 · 3 · 11\n`+
    `selector     14 teeth   = q₂ · M_DM   (M_DM = (|F₇| − 5)/q₂ = 7)\n`+
    `Klein twin    2 teeth   = q₂          (Z₂ antipodal involution)\n`+
    `\n`+
    `mesh ratio   ω_sel / ω_big  =  264 / 14  =  132/7  ≈  18.857\n`+
    `marked tooth #13 of 14      =  cusp 1/2 ground state\n`+
    `                            =  w₊ = (q − 1)/q  =  13/14`

  document.getElementById('p1').textContent =
    `rigidity ∈ [0, 1] :\n`+
    `  1.0   rigid triangular teeth     gears  ↔  K → ∞ Kuramoto\n`+
    `  0.5   Gaussian tongues   K/q²    Arnold lock criterion\n`+
    `  0.0   no teeth                  smooth Kuramoto field\n`+
    `\n`+
    `Lemma 7 lives on the rigidity = 1 limit :\n`+
    `  tooth-contact stick-slip = saddle-node x² + μ\n`+
    `  ⇒  Born exponent = 2  from the engagement geometry.`

  const big = 264, sel = 14, gcd = (a, b) => b ? gcd(b, a % b) : a
  const g = gcd(big, sel)
  document.getElementById('p2').textContent =
    `gcd(264, 14)  =  ${g}     reduced ratio  ${big/g} : ${sel/g}\n`+
    `\n`+
    `closure partition :\n`+
    `   Ω_Λ  : Ω_DM : Ω_b  =  181 : 70 : 13   (out of 264 teeth)\n`+
    `   Ω_DM / Ω_b         =   70 / 13  ≈  5.385\n`+
    `\n`+
    `selector duty cycle :\n`+
    `   13 of 14 teeth  →  ground state\n`+
    `    1 of 14 teeth  →  boundary cusp\n`+
    `   ⇒  partial-lock weight  w₊ = 13/14`

  document.getElementById('p3').textContent =
    `discrete  (gears)         ↔   continuous  (Kuramoto, demo 10)\n`+
    `─────────────────────────────────────────────────────────────\n`+
    `tooth count  n             ↔   compact-S¹ winding  n_k ∈ ℤ\n`+
    `mesh ratio   p/q           ↔   Arnold tongue centre  Ω = p/q\n`+
    `tooth width                 ↔   tongue width  K/q²\n`+
    `engagement contact         ↔   saddle-node parabola  x² + μ\n`+
    `Klein twin shaft           ↔   antipodal involution  τ\n`+
    `\n`+
    `Antikythera vibe: cosmological period ratios as carved metal.`
}
setPanels()

// --- GUI + loop ---------------------------------------------------------

const gui = new GUI({ title:'gears · 264 / 14' })
gui.add(S,'rigidity', 0, 1, 0.01).name('rigidity (∞ K → 0)')
gui.add(S,'speed', -2, 2, 0.01).name('ω_big')
gui.add(S,'ratioMode', { 'kinematic 264:14':'kinematic', 'closure decorative':'closure' }).name('coupling')
gui.add(S,'showKlein').name('show Klein twin')
gui.add(S,'showCusps').name('show Γ₀(6) cusps')
gui.add(S,'paused').name('pause')

let last = performance.now()
function loop(){
  const now = performance.now()
  const dt = Math.min(0.05, (now - last) * 1e-3); last = now
  if(!S.paused){
    θ_big += S.speed * dt
    if(S.ratioMode === 'kinematic'){
      // ω_sel = -ω_big × (264/14)   (counter-rotation by sign)
      θ_sel -= S.speed * dt * (264 / 14)
    } else {
      θ_sel += S.speed * dt
    }
  }
  draw()
  requestAnimationFrame(loop)
}
loop()
</script>
