<!doctype html>
<meta charset=utf-8>
<title>topo-acoustic lattice · 2D Stribeck · ℤ₂ mode-lock · v0.1</title>
<style>
  html,body{margin:0;height:100%;background:#000;color:#9cf;font:11px/1.4 ui-monospace,monospace;overflow:hidden}
  #stage{display:grid;grid-template-columns:1fr 360px;height:100%}
  #scene{position:relative;background:#000}
  #scene canvas{position:absolute;inset:0;width:100%;height:100%}
  #side{border-left:1px solid #1a2230;padding:10px;overflow:auto}
  .panel{margin:0 0 10px;padding:8px;background:#050a10;border:1px solid #1a2230;border-radius:2px}
  .panel h3{margin:0 0 6px;color:#cfe;font:11px/1.3 ui-monospace,monospace;font-weight:400}
  .panel .body{white-space:pre;color:#9cf}
  .lil-gui{--background-color:#0a0f14;--text-color:#9cf;--title-background-color:#111;--widget-color:#1a2230;--hover-color:#243040;--focus-color:#2d3a4d;--number-color:#cfe;--string-color:#fc9;--font-size:11px;--input-font-size:11px}
</style>
<div id=stage>
  <div id=scene><canvas id=geC></canvas></div>
  <div id=side>
    <div class=panel><h3>Stribeck contact  μ(v)</h3><div class=body id=p0></div></div>
    <div class=panel><h3>ℤ₂ dimerization  (q₂ = 2 involution)</h3><div class=body id=p1></div></div>
    <div class=panel><h3>subharmonic mode-lock</h3><div class=body id=p2></div></div>
    <div class=panel><h3>friction ↔ topology handshake</h3><div class=body id=p3></div></div>
  </div>
</div>
<script type=importmap>
{"imports":{ "lil-gui":"https://unpkg.com/lil-gui@0.19.2/dist/lil-gui.esm.js" }}
</script>
<script type=module>
import GUI from 'lil-gui'

// =========================================================================
// Demo 12 — 2D topological acoustic lattice  (first pass, v0.1)
//
//   README spec : "construct a 2D topological acoustic lattice or a
//   topoelectrical circuit that mimics this precise Stribeck lattice
//   friction and ℤ₂ mode-locking geometry."
//
//   Substrate  : harmonics/stribeck_lattice.py  (the 1D friction chain)
//                harmonics/driven_stribeck.py    (subharmonic conversion)
//
//   What this is :
//     • A G×G acoustic membrane.  Each node carries one out-of-plane
//       displacement u and velocity v (a scalar phonon field).
//     • Every bond is a Stribeck friction CONTACT, not a linear spring.
//       Its effective stiffness is the bond stiffness times the exact
//       Stribeck curve evaluated at the bond's relative velocity:
//
//          μ(v_rel) = μ_k + (μ_s − μ_k) · exp(−(v_rel / v_thr)²)
//          k_eff    = t_bond · μ(v_rel) / μ_s          (stick→1, slip→μ_k/μ_s)
//
//       Low relative velocity = STICK = stiff coupling (rigid).
//       High relative velocity = SLIP = weak coupling.   Same curve,
//       same defaults (μ_s 1.2, μ_k 0.25, v_thr 0.15) as the python source.
//
//     • The bonds are DIMERIZED (SSH / Su–Schrieffer–Heeger in 2D):
//       intra-cell t₁ and inter-cell t₂ alternate by parity along x and y.
//       δ tunes t₁ = K(1+δ), t₂ = K(1−δ).  The choice of which bond is
//       strong is a ℤ₂ datum per axis — the q₂ = 2 Klein involution.
//          δ > 0 :  trivial      ν = 0   (no boundary modes)
//          δ < 0 :  topological  ν = 1   (edge / corner modes appear)
//
//     • Drive one node at ω_d.  The Stribeck nonlinearity pumps energy
//       into subharmonic channels ω_d/2, ω_d/3, …  The framework's
//       Stribeck-lattice result: the chain locks at N = q₃ = 3 (the
//       triangle, first stable polygon).  A running estimator reports the
//       lock order at the probe node.
//
//   First-pass honesty: the ν index here is the analytic SSH winding
//   (sign of t₂−t₁ per axis), NOT a Bloch integral over the live
//   velocity-dependent stiffness — that band computation is deferred.
//   The edge ring is the PREDICTED mode locus; localization emerges from
//   the dynamics when you drive a boundary node in the topological phase.
// =========================================================================

const TWO_PI = 2 * Math.PI

// ---- lattice ------------------------------------------------------------
const G = 12                       // nodes per side  (G×G membrane)
const N = G * G
const u  = new Float64Array(N)     // out-of-plane displacement
const v  = new Float64Array(N)     // velocity
const idx = (i, j) => j * G + i

const S = {
  delta: -0.5,        // dimerization. <0 topological (ν=1), >0 trivial (ν=0)
  K: 6.0,             // base bond stiffness
  k0: 1.0,            // anchoring spring to ground (each node)
  damping: 0.06,      // linear viscous damping
  mu_s: 1.2,          // static friction  (peak coupling)   — stribeck source
  mu_k: 0.25,         // kinetic friction (residual)        — stribeck source
  v_thr: 0.15,        // Stribeck transition velocity        — stribeck source
  driveAmp: 1.6,      // forcing amplitude on the drive node
  driveFreq: 2.2,     // ω_d  (rad/s)
  driveEdge: true,    // drive a boundary node (true) or the centre (false)
  showBonds: true,
  showEdgeRing: true,
  paused: false,
}

let t = 0
function reset(){ u.fill(0); v.fill(0); t = 0; lockBuf.length = 0; probeLast = 0; probeT = 0 }

// ---- Stribeck friction curve (verbatim from stribeck_lattice.py) --------
function stribeck(vRel){
  const r = Math.abs(vRel) / S.v_thr
  return S.mu_k + (S.mu_s - S.mu_k) * Math.exp(-r * r)   // μ(v_rel)
}
// normalised coupling factor s ∈ (μ_k/μ_s, 1]:  stick→1, slip→μ_k/μ_s
const stickFactor = vRel => stribeck(vRel) / S.mu_s

// ---- dimerized bond stiffness -------------------------------------------
// A bond between cells is intra-cell (t₁) or inter-cell (t₂) by the parity
// of the lower index along that bond's axis.  t₁ = K(1+δ), t₂ = K(1−δ).
function bondBase(lowIndex){
  return (lowIndex % 2 === 0)
    ? S.K * (1 + S.delta)    // intra-cell  t₁
    : S.K * (1 - S.delta)    // inter-cell  t₂
}

// ---- one physics substep (symplectic Euler) -----------------------------
function step(dt){
  // accelerations
  const a = accBuf
  a.fill(0)
  // x-bonds
  for(let j = 0; j < G; j++){
    for(let i = 0; i < G - 1; i++){
      const p = idx(i, j), q = idx(i + 1, j)
      const vRel = v[q] - v[p]
      const k = bondBase(i) * stickFactor(vRel)
      const f = k * (u[q] - u[p])     // force on p toward q
      a[p] += f; a[q] -= f
    }
  }
  // y-bonds
  for(let j = 0; j < G - 1; j++){
    for(let i = 0; i < G; i++){
      const p = idx(i, j), q = idx(i, j + 1)
      const vRel = v[q] - v[p]
      const k = bondBase(j) * stickFactor(vRel)
      const f = k * (u[q] - u[p])
      a[p] += f; a[q] -= f
    }
  }
  const drv = S.driveAmp * Math.sin(S.driveFreq * t)
  const dn = driveNode()
  for(let n = 0; n < N; n++){
    let acc = a[n] - S.k0 * u[n] - S.damping * v[n]
    if(n === dn) acc += drv
    v[n] += acc * dt
    u[n] += v[n] * dt
  }
  t += dt
}
const accBuf = new Float64Array(N)

function driveNode(){
  return S.driveEdge ? idx(0, (G / 2) | 0) : idx((G / 2) | 0, (G / 2) | 0)
}

// ---- subharmonic lock estimator -----------------------------------------
// Watch a probe node far from the drive; time between successive positive
// peaks → response period.  N_lock ≈ round(T_response / T_drive).
const probeNode = () => idx(G - 1, (G / 2) | 0)
const lockBuf = []            // recent response periods
let probeLast = 0, probeT = 0, probePrevU = 0, probePrevV = 0
function trackLock(dt){
  const n = probeNode()
  // positive-going peak: velocity sign flip + + + → −
  if(probePrevV > 0 && v[n] <= 0 && u[n] > 0.02){
    const period = (t - probeLast)
    if(probeLast > 0 && period > 1e-3){
      lockBuf.push(period)
      if(lockBuf.length > 12) lockBuf.shift()
    }
    probeLast = t
  }
  probePrevV = v[n]
}
function lockOrder(){
  if(lockBuf.length < 3) return null
  const Tr = lockBuf.reduce((s, x) => s + x, 0) / lockBuf.length
  const Td = TWO_PI / S.driveFreq
  return { Tr, Td, N: Tr / Td }
}

// ---- ℤ₂ invariant (analytic SSH winding per axis) -----------------------
//   ν = 1  ⇔  inter-cell bond stronger than intra-cell  ⇔  δ < 0
function z2(){ return S.delta < 0 ? 1 : 0 }

// =========================================================================
// rendering
// =========================================================================
const C = document.getElementById('geC')
const ctx = C.getContext('2d', { alpha:false })
function fit(){
  const r = C.getBoundingClientRect()
  C.width  = Math.max(200, r.width  | 0)
  C.height = Math.max(200, r.height | 0)
}
fit(); addEventListener('resize', fit)

function heat(val){
  // displacement → colour.  blue (neg) · black (0) · warm (pos)
  const x = Math.max(-1, Math.min(1, val * 1.4))
  if(x >= 0){
    const a = x
    return `rgb(${(20 + 235 * a) | 0},${(30 + 200 * a) | 0},${(40 + 110 * a) | 0})`
  } else {
    const a = -x
    return `rgb(${(20 + 30 * a) | 0},${(30 + 90 * a) | 0},${(40 + 215 * a) | 0})`
  }
}

function draw(){
  const W = C.width, H = C.height
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H)

  const pad = 54
  const span = Math.min(W - 360, H) - 2 * pad
  const cell = span / (G - 1)
  const ox = pad, oy = (H - span) / 2
  const px = (i) => ox + i * cell
  const py = (j) => oy + j * cell

  // bonds, coloured by live stick/slip regime
  if(S.showBonds){
    for(let j = 0; j < G; j++) for(let i = 0; i < G - 1; i++){
      const p = idx(i, j), q = idx(i + 1, j)
      drawBond(px(i), py(j), px(i + 1), py(j), v[q] - v[p], bondBase(i))
    }
    for(let j = 0; j < G - 1; j++) for(let i = 0; i < G; i++){
      const p = idx(i, j), q = idx(i, j + 1)
      drawBond(px(i), py(j), px(i), py(j + 1), v[q] - v[p], bondBase(j))
    }
  }

  // predicted edge-mode ring (topological phase only)
  if(S.showEdgeRing && z2() === 1){
    ctx.strokeStyle = 'rgba(255,170,90,.5)'
    ctx.setLineDash([3, 4]); ctx.lineWidth = 2
    ctx.strokeRect(px(0) - 10, py(0) - 10, span + 20, span + 20)
    ctx.setLineDash([])
    ctx.fillStyle = '#fc9'; ctx.font = '10px ui-monospace'; ctx.textAlign = 'left'
    ctx.fillText('predicted ℤ₂ edge-mode locus  (ν = 1)', px(0) - 10, py(0) - 16)
  }

  // nodes (heat-mapped displacement)
  for(let j = 0; j < G; j++) for(let i = 0; i < G; i++){
    const n = idx(i, j)
    ctx.fillStyle = heat(u[n])
    ctx.beginPath(); ctx.arc(px(i), py(j), 4.5, 0, TWO_PI); ctx.fill()
    ctx.strokeStyle = 'rgba(120,150,180,.25)'; ctx.lineWidth = 1; ctx.stroke()
  }

  // drive node marker
  const dn = driveNode()
  const di = dn % G, dj = (dn / G) | 0
  ctx.strokeStyle = '#9fc'; ctx.lineWidth = 2
  ctx.beginPath(); ctx.arc(px(di), py(dj), 8, 0, TWO_PI); ctx.stroke()
  ctx.fillStyle = '#9fc'; ctx.font = '10px ui-monospace'; ctx.textAlign = 'center'
  ctx.fillText('drive ω_d', px(di), py(dj) - 12)

  // probe node marker
  const pn = probeNode(), pi = pn % G, pj = (pn / G) | 0
  ctx.strokeStyle = '#cfe'; ctx.lineWidth = 1
  ctx.beginPath(); ctx.arc(px(pi), py(pj), 7, 0, TWO_PI); ctx.stroke()
  ctx.fillStyle = '#cfe'; ctx.fillText('probe', px(pi), py(pj) + 18)

  // header
  ctx.textAlign = 'left'
  ctx.fillStyle = '#9cf'; ctx.font = '12px ui-monospace'
  ctx.fillText('2D topological acoustic lattice · Stribeck-coupled membrane', 12, 20)
  ctx.fillStyle = '#678'; ctx.font = '10px ui-monospace'
  ctx.fillText(`${G}×${G} nodes · bonds = velocity-modulated friction contacts · ${phaseLabel()}`, 12, 36)
}

function drawBond(x0, y0, x1, y1, vRel, base){
  const s = stickFactor(vRel)                 // 1 = stick, →μ_k/μ_s = slip
  const strong = base > S.K                    // intra vs inter (dimerization)
  // colour: stick = bright, slip = dim; hue carries dimerization class
  const a = 0.15 + 0.55 * s
  ctx.strokeStyle = strong
    ? `rgba(160,210,255,${a})`
    : `rgba(255,180,120,${a * 0.9})`
  ctx.lineWidth = strong ? 2.2 * s + 0.6 : 1.2 * s + 0.4
  ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.stroke()
}

function phaseLabel(){
  return z2() === 1
    ? 'TOPOLOGICAL  ν = 1  (t₂ > t₁)'
    : 'trivial  ν = 0  (t₁ > t₂)'
}

// ---- panels -------------------------------------------------------------
function energy(){
  let e = 0
  for(let n = 0; n < N; n++) e += 0.5 * v[n] * v[n] + 0.5 * S.k0 * u[n] * u[n]
  return e
}
function meanStick(){
  // average stick factor over all bonds right now
  let sum = 0, c = 0
  for(let j = 0; j < G; j++) for(let i = 0; i < G - 1; i++){
    sum += stickFactor(v[idx(i + 1, j)] - v[idx(i, j)]); c++
  }
  for(let j = 0; j < G - 1; j++) for(let i = 0; i < G; i++){
    sum += stickFactor(v[idx(i, j + 1)] - v[idx(i, j)]); c++
  }
  return sum / c
}

function panels(){
  const t1 = S.K * (1 + S.delta), t2 = S.K * (1 - S.delta)
  const sf = meanStick()
  document.getElementById('p0').textContent =
    `μ(v) = μ_k + (μ_s − μ_k)·exp(−(v/v_thr)²)\n`+
    `       μ_s ${S.mu_s.toFixed(2)}   μ_k ${S.mu_k.toFixed(2)}   v_thr ${S.v_thr.toFixed(3)}\n`+
    `\n`+
    `coupling factor  s = μ(v_rel)/μ_s\n`+
    `  stick  (v→0)   s → 1.00       rigid bond\n`+
    `  slip   (v≫)    s → ${(S.mu_k/S.mu_s).toFixed(2)}       weak bond\n`+
    `\n`+
    `⟨s⟩ now  = ${sf.toFixed(3)}   ${sf > 0.7 ? '(mostly stuck)' : sf > 0.45 ? '(stick-slip mix)' : '(mostly slipping)'}\n`+
    `lattice energy = ${energy().toFixed(2)}`

  document.getElementById('p1').textContent =
    `dimerization δ = ${S.delta.toFixed(2)}   (per-axis ℤ₂ datum)\n`+
    `  t₁ intra-cell = K(1+δ) = ${t1.toFixed(2)}\n`+
    `  t₂ inter-cell = K(1−δ) = ${t2.toFixed(2)}\n`+
    `\n`+
    `ℤ₂ winding  ν = ${z2()}        ${z2() ? 'TOPOLOGICAL' : 'trivial'}\n`+
    `  ν = 1 ⇔ t₂ > t₁ ⇔ δ < 0\n`+
    `  boundary modes : ${z2() ? 'present (edge ring)' : 'none'}\n`+
    `\n`+
    `q₂ = 2 Klein involution : the choice of strong\n`+
    `bond is the line-segment {2}-gon, the ℤ₂ seed.`

  const lk = lockOrder()
  let lockTxt
  if(!lk){
    lockTxt = `gathering peaks at probe…  (drive harder / wait)`
  } else {
    const Nr = lk.N
    const nearest = Math.max(1, Math.round(Nr))
    const crit = nearest === 3 ? '  ← N = q₃ = 3 critical (triangle)' : ''
    lockTxt =
      `T_drive    = 2π/ω_d        = ${lk.Td.toFixed(2)}\n`+
      `T_response = ${lk.Tr.toFixed(2)}  (probe peak-to-peak)\n`+
      `N_lock ≈ T_resp/T_drive    = ${Nr.toFixed(2)}\n`+
      `nearest integer order      = ${nearest}${crit}`
  }
  document.getElementById('p2').textContent =
    `drive ω_d = ${S.driveFreq.toFixed(2)}   A = ${S.driveAmp.toFixed(2)}\n`+
    `Stribeck pumps ω_d → ω_d/2, ω_d/3, … channels.\n`+
    `\n`+
    lockTxt+`\n`+
    `\n`+
    `framework: 1D Stribeck lattice locks at N = q₃ = 3\n`+
    `(stribeck_lattice.py · the first stable polygon).`

  document.getElementById('p3').textContent =
    `acoustic / friction        ↔   topological band\n`+
    `──────────────────────────────────────────────\n`+
    `Stribeck stick (low v_rel) ↔   strong bond t (rigid)\n`+
    `Stribeck slip  (high v_rel)↔   weak bond → gap closes\n`+
    `dimerization parity        ↔   ℤ₂ index ν ∈ {0,1}\n`+
    `q₂ = 2 involution          ↔   SSH winding / edge mode\n`+
    `subharmonic lock N = q₃    ↔   3-site protected mode\n`+
    `\n`+
    `topoelectric dual: t_bond → LC admittance, u → node\n`+
    `voltage, ν → quantized edge resonance.   [v0.1]`
}

// =========================================================================
// GUI + loop
// =========================================================================
const gui = new GUI({ title:'topo-acoustic · 2D Stribeck' })
gui.add(S, 'delta', -1, 1, 0.01).name('δ dimerization (ℤ₂)')
gui.add(S, 'K', 1, 14, 0.1).name('K bond stiffness')
gui.add(S, 'driveAmp', 0, 5, 0.05).name('drive A')
gui.add(S, 'driveFreq', 0.4, 6, 0.01).name('ω_d drive freq').onChange(() => { lockBuf.length = 0 })
gui.add(S, 'v_thr', 0.03, 0.6, 0.005).name('v_thr (Stribeck)')
gui.add(S, 'damping', 0, 0.3, 0.005).name('damping')
gui.add(S, 'driveEdge').name('drive edge node')
gui.add(S, 'showBonds').name('show bonds')
gui.add(S, 'showEdgeRing').name('show ℤ₂ edge ring')
gui.add(S, 'paused').name('pause')
gui.add({ reset }, 'reset').name('⟲ reset field')

let last = performance.now(), acc = 0
const SUB = 6, DT = 0.004
function loop(){
  const now = performance.now()
  let frame = Math.min(0.05, (now - last) * 1e-3); last = now
  if(!S.paused){
    acc += frame
    // fixed-step substeps for stability
    let guard = 0
    while(acc > DT && guard < 40){
      for(let s = 0; s < SUB; s++){ step(DT / SUB); trackLock(DT / SUB) }
      acc -= DT; guard++
    }
  }
  draw(); panels()
  requestAnimationFrame(loop)
}
reset(); loop()
</script>
