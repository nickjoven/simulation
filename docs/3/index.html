<!doctype html>
<meta charset=utf-8>
<title>sub-harmonic lock · p/q</title>
<style>
  html,body{margin:0;height:100%;background:#000;color:#9cf;font:11px/1.35 ui-monospace,monospace;overflow:hidden}
  #hud{position:fixed;top:8px;left:10px;pointer-events:none;white-space:pre;mix-blend-mode:screen;opacity:.9}
  #stair{position:fixed;bottom:12px;left:12px;padding:6px;background:rgba(0,0,0,.55);border:1px solid #1a2230}
  #stair canvas{display:block}
  canvas{display:block}
  .lil-gui{--background-color:#0a0f14;--text-color:#9cf;--title-background-color:#111;--widget-color:#1a2230;--hover-color:#243040;--focus-color:#2d3a4d;--number-color:#cfe;--string-color:#fc9;--font-size:11px;--input-font-size:11px}
</style>
<div id=hud></div>
<div id=stair><canvas id=stairC width=260 height=130></canvas></div>
<script type=importmap>
{"imports":{
  "three":"https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/",
  "lil-gui":"https://unpkg.com/lil-gui@0.19.2/dist/lil-gui.esm.js"
}}
</script>
<script type=module>
import * as THREE from 'three'
import { OrbitControls } from 'three/addons/controls/OrbitControls.js'
import GUI from 'lil-gui'

// Arnold tongue lock:
//   drive Ω = ω_d / ω₀ ∈ [0, 2]
//   (p,q) such that |p/q − Ω| ≤ K/q² ; smallest q wins.
//   ω_eff = p/q · ω₀ ;  amp = 1 − |Ω−p/q|·q²/K  (triangle in tongue).
// Sphere ψ = sin^q(θ')·cos(qφ' − ω_eff·t)·amp.

const vs = `
varying vec3 vN;
void main(){
  vN = normalize(normalMatrix * normal);
  gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.);
}`

const fs = `
precision highp float;
varying vec3 vN;
uniform float t, w, amp, gain;
uniform int   Q;
uniform vec3  ax;

void main(){
  vec3 n = normalize(vN);
  vec3 a = normalize(ax);
  vec3 up = abs(a.z) < 0.9 ? vec3(0.,0.,1.) : vec3(1.,0.,0.);
  vec3 e1 = normalize(cross(a, up));
  vec3 e2 = cross(a, e1);

  float ct = dot(n, a);
  float st = sqrt(max(1. - ct*ct, 0.));
  float phi = atan(dot(n, e2), dot(n, e1));

  float r = pow(st, float(Q));
  float psi = r * cos(float(Q)*phi - w*t) * amp;

  float I = psi*psi * gain;
  float sg = sign(psi);
  vec3 cp = vec3(0.25, 0.75, 1.00);
  vec3 cm = vec3(1.00, 0.35, 0.45);
  vec3 c = (sg >= 0. ? cp : cm) * clamp(I, 0., 1.);
  c += 0.02;
  gl_FragColor = vec4(c, 1.);
}`

const scene = new THREE.Scene()
const cam = new THREE.PerspectiveCamera(35, innerWidth/innerHeight, .1, 100)
cam.position.set(0, 0, 3.4)
const rnd = new THREE.WebGLRenderer({antialias:true})
rnd.setSize(innerWidth, innerHeight)
rnd.setPixelRatio(Math.min(devicePixelRatio, 2))
document.body.append(rnd.domElement)
addEventListener('resize', ()=>{
  cam.aspect = innerWidth/innerHeight; cam.updateProjectionMatrix()
  rnd.setSize(innerWidth, innerHeight)
})

const u = {
  t:   {value: 0},
  w:   {value: 1},
  Q:   {value: 1},
  amp: {value: 1},
  gain:{value: 16},
  ax:  {value: new THREE.Vector3(0,0,1)},
}
const mat = new THREE.ShaderMaterial({vertexShader:vs, fragmentShader:fs, uniforms:u})
const sph = new THREE.Mesh(new THREE.SphereGeometry(1, 384, 192), mat)
scene.add(sph)
const ctl = new OrbitControls(cam, rnd.domElement)
ctl.enableDamping = true
ctl.autoRotate = true
ctl.autoRotateSpeed = 0.5

const S = {
  Ω: 0.5,           // drive ω_d / ω₀, range [0, Ωmax]
  Ωmax: 2.0,
  K: 0.08,          // tongue width constant
  qMax: 12,
  gain: 16,
  auto: true,
  Δt: 24,           // seconds for full sweep
  rotate: true,
}

function lock(x, qMax, K){
  for(let q = 1; q <= qMax; q++){
    const p = Math.round(x * q)
    if(p < 0) continue
    const d = Math.abs(p/q - x)
    const w = K / (q*q)
    if(d <= w) return {p, q, amp: 1 - d/w, locked: true}
  }
  const q = qMax, p = Math.round(x * q)
  return {p, q, amp: 0.15, locked: false}
}

const gui = new GUI({title:'sub-harmonic lock'})
gui.add(S,'Ω',    0, S.Ωmax, 0.0005).listen()
gui.add(S,'K',    0.01, 0.3, 0.005)
gui.add(S,'qMax', 2, 24, 1)
gui.add(S,'gain', 1, 60, 0.5).onChange(v=>u.gain.value=v)
gui.add(S,'auto').name('auto Ω(t)')
gui.add(S,'Δt',   4, 120, 1).name('sweep / s')
gui.add(S,'rotate').onChange(v=>ctl.autoRotate=v)

const C = document.getElementById('stairC').getContext('2d')
const SW = 260, SH = 130
function drawStair(cur){
  C.fillStyle = '#050a10'; C.fillRect(0, 0, SW, SH)
  C.strokeStyle = '#1a2230'; C.strokeRect(.5, .5, SW-1, SH-1)
  // staircase points
  C.fillStyle = '#9cf'
  for(let i = 0; i < SW; i++){
    const x = (i / (SW-1)) * S.Ωmax
    const lk = lock(x, S.qMax, S.K)
    if(!lk.locked) continue
    const y = SH - 1 - ((lk.p / lk.q) / S.Ωmax) * (SH-2)
    C.fillRect(i, y, 1, 1)
  }
  // diagonal y=x reference
  C.strokeStyle = '#223040'
  C.beginPath(); C.moveTo(0, SH-1); C.lineTo(SW-1, 0); C.stroke()
  // current
  const cx = (S.Ω / S.Ωmax) * (SW-1)
  const cy = SH - 1 - ((cur.p / cur.q) / S.Ωmax) * (SH-2)
  C.fillStyle = '#fc9'
  C.beginPath(); C.arc(cx, cy, 3, 0, Math.PI*2); C.fill()
  // axis ticks at integer ratios
  C.fillStyle = '#456'
  C.fillText('Ω', SW-10, SH-4)
  C.fillText('p/q', 4, 10)
}

const hud = document.getElementById('hud')
let last = performance.now(), sweep = 0
function loop(){
  const now = performance.now()
  const dt = (now - last) * 1e-3; last = now
  u.t.value += dt
  if(S.auto){
    sweep += dt / Math.max(S.Δt, 1)
    const p = sweep % 2
    S.Ω = (p < 1 ? p : 2 - p) * S.Ωmax
  }
  const lk = lock(S.Ω, S.qMax, S.K)
  u.Q.value = Math.max(1, lk.q)
  u.w.value = lk.p / lk.q
  u.amp.value = lk.amp
  ctl.update()
  rnd.render(scene, cam)
  drawStair(lk)
  hud.textContent =
    `Ω = ${S.Ω.toFixed(4)}\n`+
    `lock: ${lk.p}/${lk.q}  ${lk.locked ? '✓' : '∅'}\n`+
    `ω_eff = ${(lk.p/lk.q).toFixed(4)}  amp = ${lk.amp.toFixed(3)}\n`+
    `K = ${S.K.toFixed(3)}   q_max = ${S.qMax}`
  requestAnimationFrame(loop)
}
loop()
</script>
