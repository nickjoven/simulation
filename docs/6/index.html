<!doctype html>
<meta charset=utf-8>
<title>tower · 6 × 13⁵⁴</title>
<style>
  html,body{margin:0;height:100%;background:#000;color:#9cf;font:11px/1.35 ui-monospace,monospace;overflow:hidden}
  #hud{position:fixed;top:8px;left:10px;pointer-events:none;white-space:pre;mix-blend-mode:screen;opacity:.9}
  canvas{display:block}
  .lil-gui{--background-color:#0a0f14;--text-color:#9cf;--title-background-color:#111;--widget-color:#1a2230;--hover-color:#243040;--focus-color:#2d3a4d;--number-color:#cfe;--string-color:#fc9;--font-size:11px;--input-font-size:11px}
</style>
<div id=hud></div>
<script type=importmap>
{"imports":{
  "three":"https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/",
  "lil-gui":"https://unpkg.com/lil-gui@0.19.2/dist/lil-gui.esm.js"
}}
</script>
<script type=module>
import * as THREE from 'three'
import { OrbitControls } from 'three/addons/controls/OrbitControls.js'
import GUI from 'lil-gui'
import { VS, FS_PRELUDE, FS_MARCH, defaultPalette, fareyList } from '../common.js'

// R = q₂·q₃ · (q₂² + q₃²)^{q₂·q₃^d} = 6 · 13^54        (Planck / Hubble)
//   q₂=2, q₃=3, d=3
//   |F₆| = 13   (Farey fractions at order 6)
//   gauge Z₆ = 6-fold rotation
//
// Tower (static): 54 shells × 13 Farey-indexed angular blobs × Z₆ gauge phase.
// Observable = Gaussian envelope W(r) centred at r = r_obs.
// View modes remap shell radii: preserve different notions of "unit spacing".

// fractions of F_Q as [0, 1] reals ; |F_6| = 13, |F_7| = 19, |F_19| = 121.
const L_MAX = 54
function fareyReals(Q){ return fareyList(Q).map(([p, q]) => p / q) }

// shellR(ℓ, mode) ∈ (0, 1]
//   log  : r = (ℓ+1)/L          unit = one factor of 13
//   lin  : r = 13^{(ℓ+1-L)/L}   unit = one unit of physical length
//   semi : r = √((ℓ+1)/L)       unit = one unit of √(physical)
function shellR(ℓ, mode){
  const t = (ℓ + 1) / L_MAX
  if(mode === 'log')  return t
  if(mode === 'lin')  return Math.pow(13, (ℓ + 1 - L_MAX) / L_MAX)
  if(mode === 'semi') return Math.sqrt(t)
  return t
}

function bakeTower(N, mode, σr, σθ, Q){
  const buf = new Float32Array(N*N*N)
  const radii = []
  for(let ℓ = 0; ℓ < L_MAX; ℓ++) radii.push(shellR(ℓ, mode))
  const dirs = fareyReals(Q).map(f => {
    const a = 2 * Math.PI * f
    return [Math.cos(a), Math.sin(a), 0]
  })
  let i = 0
  for(let z = 0; z < N; z++){
    const zc = (z + 0.5)/N * 2 - 1
    for(let y = 0; y < N; y++){
      const yc = (y + 0.5)/N * 2 - 1
      for(let x = 0; x < N; x++){
        const xc = (x + 0.5)/N * 2 - 1
        const r = Math.hypot(xc, yc, zc)
        let v = 0
        if(r > 1e-4 && r <= 1){
          let radial = 0
          for(let ℓ = 0; ℓ < L_MAX; ℓ++){
            const d = (r - radii[ℓ]) / σr
            radial += Math.exp(-0.5 * d * d)
          }
          const nx = xc / r, ny = yc / r, nz = zc / r
          let angular = 0
          for(const d of dirs){
            const dot = nx*d[0] + ny*d[1] + nz*d[2]
            const dd = (1 - dot) / σθ
            angular += Math.exp(-0.5 * dd * dd)
          }
          v = radial * angular
        }
        buf[i++] = v
      }
    }
  }
  const tex = new THREE.Data3DTexture(buf, N, N, N)
  tex.format = THREE.RedFormat
  tex.type = THREE.FloatType
  tex.minFilter = THREE.LinearFilter
  tex.magFilter = THREE.LinearFilter
  tex.wrapR = THREE.ClampToEdgeWrapping
  tex.wrapS = THREE.ClampToEdgeWrapping
  tex.wrapT = THREE.ClampToEdgeWrapping
  tex.needsUpdate = true
  return tex
}

// gauge: Z₆ rotation around tower axis (z).  observable envelope on r.

const EXTRA = `
uniform sampler3D vol;
uniform float gaugeCos;
uniform float gaugeSin;
uniform float rObs;
uniform float sObs;
uniform float obsOn;
`
const PSI = `
vec3 pr = vec3(p.x*gaugeCos - p.y*gaugeSin, p.x*gaugeSin + p.y*gaugeCos, p.z);
float f = V(vol, pr);
float r = length(p);
float wo = exp(-0.5 * pow((r - rObs)/sObs, 2.0));
float w  = mix(1.0, wo, obsOn);
psi = f * w;
`
const fs = FS_PRELUDE + FS_MARCH(EXTRA, PSI)

const scene = new THREE.Scene()
const cam = new THREE.PerspectiveCamera(35, innerWidth/innerHeight, .1, 100)
cam.position.set(0, 0, 3.4)
const rnd = new THREE.WebGLRenderer({antialias:true})
rnd.setSize(innerWidth, innerHeight)
rnd.setPixelRatio(Math.min(devicePixelRatio, 2))
document.body.append(rnd.domElement)
addEventListener('resize', ()=>{
  cam.aspect = innerWidth/innerHeight; cam.updateProjectionMatrix()
  rnd.setSize(innerWidth, innerHeight)
})

const u = {
  ...defaultPalette(),
  t:{value:0}, w:{value:0}, gain:{value:8}, STEPS:{value:128},
  vol:{value: null},
  gaugeCos:{value:1}, gaugeSin:{value:0},
  rObs:{value:0.5}, sObs:{value:0.05}, obsOn:{value:1},
}
const mat = new THREE.ShaderMaterial({
  vertexShader: VS, fragmentShader: fs, uniforms: u,
  glslVersion: THREE.GLSL3,
})
const sph = new THREE.Mesh(new THREE.SphereGeometry(1.001, 96, 48), mat)
scene.add(sph)
const ctl = new OrbitControls(cam, rnd.domElement)
ctl.enableDamping = true
ctl.autoRotate = true
ctl.autoRotateSpeed = 0.5

const S = {
  view: 'log',
  Q: 6,                 // |F_Q|   framework-spec q₂q₃ = 6 → 13 fractions.  7 → 19, 19 → 121.
  N: 96,
  σr: 0.008,            // shell half-width (radial)
  σθ: 0.22,             // angular blob half-width
  g: 0,                 // Z₆ phase 0..5 (real-valued → animated if auto)
  ωg: 0.3,              // gauge cycle rate
  autoGauge: false,
  rObs: 0.5,            // observable centre in view-mode r-coord
  sObs: 0.05,
  obsOn: true,
  gain: 8, STEPS: 128,
  rotate: true,
}

const rebake = ()=>{
  if(u.vol.value) u.vol.value.dispose()
  u.vol.value = bakeTower(S.N, S.view, S.σr, S.σθ, S.Q)
}
const sync = ()=>{
  u.gain.value = S.gain; u.STEPS.value = S.STEPS
  u.rObs.value = S.rObs; u.sObs.value = S.sObs
  u.obsOn.value = S.obsOn ? 1 : 0
  const ph = 2 * Math.PI * S.g / 6
  u.gaugeCos.value = Math.cos(ph); u.gaugeSin.value = Math.sin(ph)
}
rebake(); sync()

const gui = new GUI({title:'tower · 6×13⁵⁴'})
gui.add(S,'view', ['log','lin','semi']).onChange(()=>{ rebake() })
gui.add(S,'Q', 2, 19, 1).name('Q (|F_Q| traps)').onChange(rebake)
gui.add(S,'σr', 0.002, 0.05, 0.001).name('σ_r').onChange(rebake)
gui.add(S,'σθ', 0.05, 0.6, 0.01).name('σ_θ').onChange(rebake)
gui.add(S,'g', 0, 6, 0.01).listen().onChange(sync).name('gauge g/6')
gui.add(S,'autoGauge').name('gauge ω on')
gui.add(S,'ωg', 0, 3, 0.01).name('ω_g')
gui.add(S,'rObs', 0, 1, 0.001).onChange(sync).name('r_obs')
gui.add(S,'sObs', 0.005, 0.3, 0.005).onChange(sync).name('σ_obs')
gui.add(S,'obsOn').onChange(sync).name('window W(r)')
gui.add(S,'gain', 0.5, 40, 0.5).onChange(sync)
gui.add(S,'STEPS', 32, 256, 4).onChange(sync)
gui.add(S,'N', 48, 128, 16).name('bake N').onChange(rebake)
gui.add(S,'rotate').onChange(v=>ctl.autoRotate=v)

const hud = document.getElementById('hud')
let last = performance.now()
function loop(){
  const now = performance.now()
  const dt = (now - last) * 1e-3; last = now
  u.t.value += dt
  if(S.autoGauge){
    S.g = (S.g + S.ωg * dt) % 6
    sync()
  }
  ctl.update()
  rnd.render(scene, cam)
  hud.textContent =
    `R = q₂q₃ · (q₂²+q₃²)^{q₂q₃^d} = 6 · 13⁵⁴\n`+
    `Λℓ_P² = 13⁻¹⁰⁸/12   (sibling of R, D27)\n`+
    `total budget = |F₆| + q₂q₃ = 13 + 6 = 19\n`+
    `view = ${S.view}   Q = ${S.Q}   |F_Q| = ${fareyReals(S.Q).length}   Z₆ phase = ${S.g.toFixed(2)}/6\n`+
    `r_obs = ${S.rObs.toFixed(3)}  σ_obs = ${S.sObs.toFixed(3)}  ${S.obsOn?'W(r) on':'W(r) off'}\n`+
    `σ_r = ${S.σr.toFixed(3)}  σ_θ = ${S.σθ.toFixed(2)}  bake ${S.N}³  STEPS ${S.STEPS}`
  requestAnimationFrame(loop)
}
loop()
</script>
