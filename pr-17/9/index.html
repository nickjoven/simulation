<!doctype html>
<meta charset=utf-8>
<title>Ω · two-component closure · Γ₀(6) cusp 1/2</title>
<style>
  html,body{margin:0;height:100%;background:#000;color:#9cf;font:11px/1.35 ui-monospace,monospace;overflow:hidden}
  #stage{display:grid;grid-template-columns:1fr 380px;height:100%}
  #pie{position:relative;background:#000}
  #pie canvas{position:absolute;inset:0;width:100%;height:100%}
  #side{border-left:1px solid #1a2230;padding:12px;overflow:auto}
  #hud{white-space:pre;color:#9cf;opacity:.9}
  #cuspC{display:block;margin-top:10px;background:#050a10;border:1px solid #1a2230}
  table{border-collapse:collapse;margin-top:10px;font-size:10px;width:100%}
  td,th{padding:3px 6px;border-bottom:1px dotted #1a2230;text-align:right}
  th{color:#678;font-weight:400}
  td.n{color:#cfe}
  td.L{color:#9cf}
  td.D{color:#fc9}
  td.B{color:#9fc}
  td.r{color:#678}
  caption{caption-side:top;color:#678;font-size:10px;text-align:left;padding:6px 0 2px}
  .lil-gui{--background-color:#0a0f14;--text-color:#9cf;--title-background-color:#111;--widget-color:#1a2230;--hover-color:#243040;--focus-color:#2d3a4d;--number-color:#cfe;--string-color:#fc9;--font-size:11px;--input-font-size:11px}
</style>
<div id=stage>
  <div id=pie><canvas id=pieC></canvas></div>
  <div id=side>
    <div id=hud></div>
    <canvas id=cuspC width=356 height=140></canvas>
    <table id=tbl>
      <caption>two-component closure (w₊ = 13/14)  vs  observed</caption>
      <thead><tr><th>component</th><th>p/q</th><th>computed</th><th>observed</th><th>Δ</th></tr></thead>
      <tbody></tbody>
    </table>
    <table id=tbl2>
      <caption>single-w reference (D26 only)</caption>
      <thead><tr><th>component</th><th>p/q</th><th>computed</th><th>Δ</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>
<script type=importmap>
{"imports":{
  "lil-gui":"https://unpkg.com/lil-gui@0.19.2/dist/lil-gui.esm.js"
}}
</script>
<script type=module>
import GUI from 'lil-gui'

// Two-component cosmological closure (harmonics MANIFEST.yml, scorecard).
//   Ω_Λ  = 181/264 ≈ 0.68561        (D47 + Γ₀(6) cusp 1/2 ground state)
//   Ω_DM =  70/264 = 35/132 ≈ 0.26515
//   Ω_b  =  13/264 ≈ 0.04924
//   181 + 70 + 13 = 264              ⇒ Σ Ω_i = 1 exactly.
//   Ω_DM/Ω_b = 70/13 ≈ 5.385.
//
// Inputs : two ratios from the framework.
//   w₊ = 13/14   from Γ₀(6) cusp 1/2 ground state (L1_substrate_cusp_ground_state.md)
//   w₋ = 1       from sign-representation no-EM constraint
//
// Sym/antisym decomposition (omega_b_alpha_beta_closure.md):
//   Ω_DM = sym component    (couples to gravity, not EM)
//   Ω_b  = antisym component (couples to gravity + EM)
//   Ω_Λ  = vacuum residue
//
// Single-w D26 reference (no two-component refinement):
//   Ω_Λ = 13/19, Ω_DM = 5/19, Ω_b = 1/19, Ω_DM/Ω_b = 5
//   Total budget |F₆| + q₂q₃ = 13 + 6 = 19.

const TWO = {
  Ω_Λ: { p:181, q:264, name:'Ω_Λ',  obs:0.6847,  obsσ:0.0073,   col:'#9cf', label:'dark energy' },
  Ω_DM:{ p: 70, q:264, name:'Ω_DM', obs:0.265,   obsσ:0.007,    col:'#fc9', label:'dark matter' },
  Ω_b: { p: 13, q:264, name:'Ω_b',  obs:0.0493,  obsσ:0.0003,   col:'#9fc', label:'baryons'     },
}
const RATIO = { p:70, q:13, obs:5.41 }
const ONE = {
  Ω_Λ: { p:13, q:19, obs:0.6847 },
  Ω_DM:{ p: 5, q:19, obs:0.265  },
  Ω_b: { p: 1, q:19, obs:0.0493 },
}
const W_PLUS = { p:13, q:14 }   // Γ₀(6) cusp 1/2 ground state
const W_MINUS = 1                // sign-rep no-EM

// Γ₀(6) cusps : equivalence classes under the congruence subgroup of level 6.
//   {∞, 0, 1/2, 1/3}  (4 cusps).  Cusp 1/2 supplies w₊.
const CUSPS = [
  { x:1.00, y:0.50, label:'∞',   note:'',                    active:false },
  { x:0.05, y:0.50, label:'0',   note:'',                    active:false },
  { x:0.50, y:0.50, label:'1/2', note:'w₊ = 13/14 ground',   active:true  },
  { x:0.33, y:0.50, label:'1/3', note:'',                    active:false },
]

// --- pie / donut canvas ----------------------------------------------------

const pieC = document.getElementById('pieC')
const px = pieC.getContext('2d', { alpha:false })
function fit(){
  const r = pieC.getBoundingClientRect()
  pieC.width  = Math.max(200, r.width  | 0)
  pieC.height = Math.max(200, r.height | 0)
}
fit(); addEventListener('resize', ()=>{ fit(); drawPie() })

const TWO_PI = 2 * Math.PI

function drawPie(){
  const W = pieC.width, H = pieC.height
  px.fillStyle = '#000'; px.fillRect(0, 0, W, H)

  const cx = W * 0.5, cy = H * 0.5
  const Rout = Math.min(W, H) * 0.40
  const Rin  = Rout * 0.55
  const items = [TWO.Ω_Λ, TWO.Ω_DM, TWO.Ω_b]
  const total = items.reduce((s, it) => s + it.p, 0)

  // start at top, sweep clockwise
  let a0 = -Math.PI/2
  for(const it of items){
    const frac = it.p / total
    const a1 = a0 + frac * TWO_PI
    // pulse: highlighted sector at index hl
    const isHL = (it === items[S.hl])
    const fill = isHL ? brighten(it.col, S.pulse) : it.col

    px.beginPath()
    px.moveTo(cx + Rin  * Math.cos(a0), cy + Rin  * Math.sin(a0))
    px.arc(cx, cy, Rout, a0, a1, false)
    px.lineTo(cx + Rin  * Math.cos(a1), cy + Rin  * Math.sin(a1))
    px.arc(cx, cy, Rin,  a1, a0, true)
    px.closePath()
    px.fillStyle = fill
    px.globalAlpha = isHL ? 1.0 : 0.78
    px.fill()
    px.globalAlpha = 1.0

    // 264 tick marks on outer rim for sectors of this slice
    px.strokeStyle = 'rgba(0,0,0,.55)'
    px.lineWidth = 1
    for(let k = 1; k < it.p; k++){
      const a = a0 + (k / it.p) * (a1 - a0)
      px.beginPath()
      px.moveTo(cx + (Rout - 4) * Math.cos(a), cy + (Rout - 4) * Math.sin(a))
      px.lineTo(cx + Rout * Math.cos(a), cy + Rout * Math.sin(a))
      px.stroke()
    }

    // label
    const am = (a0 + a1) / 2
    const lr = (Rout + Rin) / 2
    const lx = cx + lr * Math.cos(am)
    const ly = cy + lr * Math.sin(am)
    px.fillStyle = '#000'
    px.font = 'bold 12px ui-monospace'
    px.textAlign = 'center'
    px.textBaseline = 'middle'
    px.fillText(`${it.name}`, lx, ly - 7)
    px.font = '10px ui-monospace'
    px.fillText(`${it.p}/${it.q}`, lx, ly + 7)

    a0 = a1
  }

  // centre label
  px.fillStyle = '#9cf'
  px.font = '11px ui-monospace'
  px.textAlign = 'center'
  px.textBaseline = 'middle'
  px.fillText('Σ Ω_i = 264/264 = 1', cx, cy - 7)
  px.font = '10px ui-monospace'
  px.fillStyle = '#678'
  px.fillText('two-component closure', cx, cy + 7)

  // K = K_c style annotation (top)
  px.fillStyle = '#9cf'
  px.font = '11px ui-monospace'
  px.textAlign = 'left'
  px.fillText(`Ω_Λ : Ω_DM : Ω_b  =  181 : 70 : 13`, 10, 16)
  px.fillStyle = '#678'
  px.fillText(`from w₊ = 13/14  (Γ₀(6) cusp 1/2)  +  w₋ = 1  (sign-rep no-EM)`, 10, 30)
}

function brighten(hex, k){
  // hex like '#9cf' or '#abcdef' → bias toward white by k ∈ [0, 1]
  const h = hex.length === 4
    ? [parseInt(hex[1]+hex[1],16), parseInt(hex[2]+hex[2],16), parseInt(hex[3]+hex[3],16)]
    : [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)]
  const m = (c) => Math.round(c + (255 - c) * k)
  return `rgb(${m(h[0])},${m(h[1])},${m(h[2])})`
}

// --- cusp inset ------------------------------------------------------------

const cuspC = document.getElementById('cuspC')
const cx2 = cuspC.getContext('2d')

function drawCusps(){
  const W = cuspC.width, H = cuspC.height
  cx2.fillStyle = '#050a10'; cx2.fillRect(0, 0, W, H)
  cx2.strokeStyle = '#1a2230'; cx2.strokeRect(.5, .5, W-1, H-1)

  // baseline (real axis)
  const y0 = H - 28
  cx2.strokeStyle = '#1a2230'
  cx2.beginPath(); cx2.moveTo(20, y0); cx2.lineTo(W-20, y0); cx2.stroke()

  // tick marks at 0 and 1
  cx2.fillStyle = '#456'
  cx2.font = '10px ui-monospace'
  cx2.textAlign = 'center'
  for(const xn of [0, 0.5, 1]){
    const x = 20 + xn * (W - 40)
    cx2.beginPath(); cx2.moveTo(x, y0-2); cx2.lineTo(x, y0+2); cx2.stroke()
    cx2.fillText(String(xn), x, y0 + 14)
  }

  // cusp dots {∞, 0, 1/2, 1/3}.  cusp 1/p ↔ trivial Z_p rep (Hecke / Lemma 6)
  const positions = [
    { x:0.05, label:'0',   sub:'(triv Z₂ ∩ Z₃)', active:false },
    { x:0.33, label:'1/3', sub:'(triv Z₃)',      active:false },
    { x:0.50, label:'1/2', sub:'ψ₊(1,5)',         active:true  },
    { x:0.95, label:'∞',   sub:'(sign rep)',     active:false },
  ]
  for(const c of positions){
    const x = 20 + c.x * (W - 40)
    cx2.fillStyle = c.active ? '#fc9' : '#456'
    cx2.beginPath(); cx2.arc(x, y0, c.active ? 5 : 3, 0, TWO_PI); cx2.fill()
    cx2.fillStyle = c.active ? '#fc9' : '#9cf'
    cx2.font = c.active ? 'bold 10px ui-monospace' : '10px ui-monospace'
    cx2.textBaseline = 'bottom'
    cx2.fillText(c.label, x, y0 - 8)
    cx2.fillStyle = c.active ? '#fc9' : '#456'
    cx2.font = '9px ui-monospace'
    cx2.fillText(c.sub, x, y0 + 26)
  }
  cx2.textBaseline = 'alphabetic'
  cx2.textAlign = 'left'
  cx2.fillStyle = '#9cf'
  cx2.font = '10px ui-monospace'
  cx2.fillText('Γ₀(6) cusps  {∞, 0, 1/2, 1/3}   (Hecke ↔ Z_p rep)', 10, 14)
  cx2.fillStyle = '#fc9'
  cx2.fillText('cusp 1/2  ←  ψ₊(1,5)  →  w₊ = 13/14', 10, 28)
}

// --- HUD + tables ----------------------------------------------------------

function fmtPct(δ){
  const a = Math.abs(δ * 100)
  return (a < 0.01 ? '0.00%' : a.toFixed(2) + '%')
}
function residual(comp, obs){ return (comp - obs) / obs }

function renderTables(){
  const tb = document.querySelector('#tbl tbody')
  tb.innerHTML = ''
  const comps = [TWO.Ω_Λ, TWO.Ω_DM, TWO.Ω_b]
  for(const it of comps){
    const v = it.p / it.q
    const r = residual(v, it.obs)
    const tr = document.createElement('tr')
    tr.innerHTML =
      `<td class=n>${it.name}</td>`+
      `<td class=n>${it.p}/${it.q}</td>`+
      `<td class=L>${v.toFixed(5)}</td>`+
      `<td class=r>${it.obs.toFixed(4)} ± ${it.obsσ}</td>`+
      `<td class=D>${fmtPct(r)}</td>`
    tb.appendChild(tr)
  }
  // ratio row
  {
    const v = RATIO.p / RATIO.q
    const r = residual(v, RATIO.obs)
    const tr = document.createElement('tr')
    tr.innerHTML =
      `<td class=n>Ω_DM/Ω_b</td>`+
      `<td class=n>${RATIO.p}/${RATIO.q}</td>`+
      `<td class=L>${v.toFixed(3)}</td>`+
      `<td class=r>${RATIO.obs}</td>`+
      `<td class=D>${fmtPct(r)}</td>`
    tb.appendChild(tr)
  }

  const tb2 = document.querySelector('#tbl2 tbody')
  tb2.innerHTML = ''
  const compsOne = [
    { name:'Ω_Λ',  ...ONE.Ω_Λ },
    { name:'Ω_DM', ...ONE.Ω_DM },
    { name:'Ω_b',  ...ONE.Ω_b },
  ]
  for(const it of compsOne){
    const v = it.p / it.q
    const r = residual(v, it.obs)
    const tr = document.createElement('tr')
    tr.innerHTML =
      `<td class=n>${it.name}</td>`+
      `<td class=n>${it.p}/${it.q}</td>`+
      `<td class=L>${v.toFixed(5)}</td>`+
      `<td class=D>${fmtPct(r)}</td>`
    tb2.appendChild(tr)
  }
}

function renderHUD(){
  document.getElementById('hud').textContent =
    `Two-component cosmological closure\n`+
    `  Ω_Λ  + Ω_DM + Ω_b  = 181/264 + 70/264 + 13/264 = 1\n`+
    `  Ω_DM / Ω_b         = 70/13 ≈ 5.385\n`+
    `  w₊ = 13/14   (Γ₀(6) cusp 1/2 ground state, mode ψ₊(1,5))\n`+
    `  w₋ = 1       (sign-rep no-EM,  Klein-monodromy −1)\n`+
    `Why q = 14  (Lemma 5):\n`+
    `  M_DM = (|F₇| − N_DM)/q₂ = (19 − 5)/2 = 7\n`+
    `  q    = q₂ · M_DM        = 2 · 7      = 14\n`+
    `  w₊   = (q − 1)/q        = 13/14   (closest-to-unity selection)\n`+
    `Source : harmonics structural_lemmas.md L1, L2, L4–L6 ·\n`+
    `         omega_b_alpha_beta_closure · L1_substrate_cusp_ground_state`
}

// --- state + loop ----------------------------------------------------------

const S = {
  hl: 0,             // 0=Λ, 1=DM, 2=b
  auto: true,
  rate: 0.5,         // highlight cycles / s
  pulse: 0.3,        // brightness bias on highlighted sector
}

const gui = new GUI({ title:'Ω · two-component closure' })
gui.add(S,'hl', { 'Ω_Λ':0, 'Ω_DM':1, 'Ω_b':2 }).name('highlight').listen()
gui.add(S,'auto').name('auto cycle')
gui.add(S,'rate', 0, 2, 0.05).name('cycle / s')
gui.add(S,'pulse', 0, 0.6, 0.02).name('pulse')

renderHUD()
renderTables()
drawCusps()

let last = performance.now(), phase = 0
function loop(){
  const now = performance.now()
  const dt = Math.min(0.05, (now - last) * 1e-3); last = now
  if(S.auto){
    phase += S.rate * dt
    S.hl = Math.floor(phase) % 3
  }
  drawPie()
  requestAnimationFrame(loop)
}
loop()
</script>
