<!doctype html>
<meta charset=utf-8>
<title>whispering gallery · jₗ(kr)·sinℓ(θ')</title>
<style>
  html,body{margin:0;height:100%;background:#000;color:#9cf;font:11px/1.35 ui-monospace,monospace;overflow:hidden}
  #hud{position:fixed;top:8px;left:10px;pointer-events:none;white-space:pre;mix-blend-mode:screen;opacity:.85}
  canvas{display:block}
  .lil-gui{--background-color:#0a0f14;--text-color:#9cf;--title-background-color:#111;--widget-color:#1a2230;--hover-color:#243040;--focus-color:#2d3a4d;--number-color:#cfe;--string-color:#fc9;--font-size:11px;--input-font-size:11px}
</style>
<div id=hud></div>
<script type=importmap>
{"imports":{
  "three":"https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/",
  "lil-gui":"https://unpkg.com/lil-gui@0.19.2/dist/lil-gui.esm.js"
}}
</script>
<script type=module>
import * as THREE from 'three'
import { OrbitControls } from 'three/addons/controls/OrbitControls.js'
import GUI from 'lil-gui'
import { VS, FS_PRELUDE, FS_MARCH, ALPHA } from '../common.js'

// ψ = jₗ(kr) · sinℓ(θ') · f(ℓφ', ωt)
// (θ',φ') in rotated frame with pole â = norm(mix(âA, âB, s)).

const EXTRA = `
uniform vec3  axA;
uniform vec3  axB;
uniform float s;
uniform int   travel;
`
const PSI = `
float r = length(p);
vec3 nh = p / max(r, 1e-5);
vec3 a = normalize(mix(axA, axB, s));
vec3 up = abs(a.z) < 0.9 ? vec3(0., 0., 1.) : vec3(1., 0., 0.);
vec3 e1 = normalize(cross(a, up));
vec3 e2 = cross(a, e1);
float ct = dot(nh, a);
float st = sqrt(max(1. - ct*ct, 0.));
float phi = atan(dot(nh, e2), dot(nh, e1));
float ang = (travel == 1)
  ? cos(float(L)*phi - w*t)
  : cos(float(L)*phi) * cos(w*t);
psi = jL(L, k*r) * pow(st, float(L)) * ang;
`
const fs = FS_PRELUDE + FS_MARCH(EXTRA, PSI)

const scene = new THREE.Scene()
const cam = new THREE.PerspectiveCamera(35, innerWidth/innerHeight, .1, 100)
cam.position.set(0, 0, 3.4)
const rnd = new THREE.WebGLRenderer({antialias:true})
rnd.setSize(innerWidth, innerHeight)
rnd.setPixelRatio(Math.min(devicePixelRatio, 2))
document.body.append(rnd.domElement)
addEventListener('resize', ()=>{
  cam.aspect = innerWidth/innerHeight; cam.updateProjectionMatrix()
  rnd.setSize(innerWidth, innerHeight)
})

// ℓ up to 5 via ALPHA table.
const u = {
  t:{value:0}, w:{value:1.6}, gain:{value:40}, STEPS:{value:128},
  L:{value:5}, M:{value:5}, k:{value:ALPHA[5][0]},
  axA:{value:new THREE.Vector3(0,0,1)},
  axB:{value:new THREE.Vector3(1,0,0)},
  s:{value:0}, travel:{value:1},
}
const mat = new THREE.ShaderMaterial({vertexShader:VS, fragmentShader:fs, uniforms:u})
const sph = new THREE.Mesh(new THREE.SphereGeometry(1.001, 96, 48), mat)
scene.add(sph)
const ctl = new OrbitControls(cam, rnd.domElement)
ctl.enableDamping = true
ctl.autoRotate = true
ctl.autoRotateSpeed = 0.4

const S = {
  ℓ: 5, n: 1, ω: 1.6, gain: 40, travel: true, STEPS: 128,
  αA: 0, βA: 0, αB: Math.PI/2, βB: 0,
  auto: true, Δt: 3.0, s: 0,
  rotate: true,
}
const setAx = (α, β, target)=>{
  target.set(Math.sin(α)*Math.cos(β), Math.sin(α)*Math.sin(β), Math.cos(α))
}
const sync = ()=>{
  u.L.value = S.ℓ
  u.k.value = ALPHA[S.ℓ][S.n-1]
  u.w.value = S.ω
  u.gain.value = S.gain
  u.travel.value = S.travel ? 1 : 0
  u.STEPS.value = S.STEPS
  setAx(S.αA, S.βA, u.axA.value)
  setAx(S.αB, S.βB, u.axB.value)
}
sync()

const gui = new GUI({title:'whispering gallery · 3D'})
gui.add(S,'ℓ', 2, 5, 1).onChange(sync)
gui.add(S,'n', 1, 3, 1).onChange(sync)
gui.add(S,'ω', 0, 6, 0.05).onChange(sync)
gui.add(S,'travel').onChange(sync)
gui.add(S,'gain', 1, 200, 1).onChange(sync)
gui.add(S,'STEPS', 32, 256, 4).onChange(sync)
const a = gui.addFolder('â A')
a.add(S,'αA', 0, Math.PI, 0.01).onChange(sync)
a.add(S,'βA', 0, 2*Math.PI, 0.01).onChange(sync)
const b = gui.addFolder('â B')
b.add(S,'αB', 0, Math.PI, 0.01).onChange(sync)
b.add(S,'βB', 0, 2*Math.PI, 0.01).onChange(sync)
gui.add(S,'s', 0, 1, 0.001).listen().onChange(v=>u.s.value=v)
gui.add(S,'auto').name('auto s(t)')
gui.add(S,'Δt', 0.2, 10, 0.1).name('Δt / s')
gui.add(S,'rotate').onChange(v=>ctl.autoRotate=v)

const hud = document.getElementById('hud')
let last = performance.now(), ph = 0
function loop(){
  const now = performance.now()
  const dt = (now - last) * 1e-3; last = now
  u.t.value += dt
  if(S.auto){
    ph += dt / Math.max(S.Δt, 0.05)
    const p = ph % 2
    S.s = p < 1 ? p : 2 - p
    u.s.value = S.s
  }
  ctl.update()
  rnd.render(scene, cam)
  hud.textContent =
    `ℓ=${S.ℓ}  n=${S.n}  k=${u.k.value.toFixed(3)}  ω=${S.ω.toFixed(2)}  ${S.travel?'→':'↔'}\n`+
    `s=${S.s.toFixed(3)}  t=${u.t.value.toFixed(1)}  STEPS=${S.STEPS}`
  requestAnimationFrame(loop)
}
loop()
</script>
