<!doctype html>
<meta charset=utf-8>
<title>sub-harmonic lock · p/q · 3D</title>
<style>
  html,body{margin:0;height:100%;background:#000;color:#9cf;font:11px/1.35 ui-monospace,monospace;overflow:hidden}
  #hud{position:fixed;top:8px;left:10px;pointer-events:none;white-space:pre;mix-blend-mode:screen;opacity:.9}
  #stair{position:fixed;bottom:12px;left:12px;padding:6px;background:rgba(0,0,0,.55);border:1px solid #1a2230}
  #stair canvas{display:block}
  canvas{display:block}
  .lil-gui{--background-color:#0a0f14;--text-color:#9cf;--title-background-color:#111;--widget-color:#1a2230;--hover-color:#243040;--focus-color:#2d3a4d;--number-color:#cfe;--string-color:#fc9;--font-size:11px;--input-font-size:11px}
</style>
<div id=hud></div>
<div id=stair><canvas id=stairC width=260 height=130></canvas></div>
<script type=importmap>
{"imports":{
  "three":"https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/",
  "lil-gui":"https://unpkg.com/lil-gui@0.19.2/dist/lil-gui.esm.js"
}}
</script>
<script type=module>
import * as THREE from 'three'
import { OrbitControls } from 'three/addons/controls/OrbitControls.js'
import GUI from 'lil-gui'
import { VS, FS_PRELUDE, FS_MARCH, ALPHA, bakeMode } from '../common.js'

// lock: (p,q) = smallest q ≤ q_max with |p/q − Ω| ≤ K/q²
// ψ = [ Y_q^q(p̂)·cos(ω_eff·t) + Y_q^{-q}(p̂)·sin(ω_eff·t) ] · jq(k_q r) · amp
// textures baked for q=1..5, swapped on lock change.

const EXTRA = `
uniform sampler3D volC;
uniform sampler3D volS;
uniform float amp;
`
const PSI = `
float a = V(volC, p);
float b = V(volS, p);
psi = (a * cos(w*t) + b * sin(w*t)) * amp;
`
const fs = FS_PRELUDE + FS_MARCH(EXTRA, PSI)

const scene = new THREE.Scene()
const cam = new THREE.PerspectiveCamera(35, innerWidth/innerHeight, .1, 100)
cam.position.set(0, 0, 3.4)
const rnd = new THREE.WebGLRenderer({antialias:true})
rnd.setSize(innerWidth, innerHeight)
rnd.setPixelRatio(Math.min(devicePixelRatio, 2))
document.body.append(rnd.domElement)
addEventListener('resize', ()=>{
  cam.aspect = innerWidth/innerHeight; cam.updateProjectionMatrix()
  rnd.setSize(innerWidth, innerHeight)
})

const u = {
  t:{value:0}, w:{value:1}, gain:{value:60}, STEPS:{value:96},
  volC:{value:null}, volS:{value:null},
  amp:{value:1},
}
const mat = new THREE.ShaderMaterial({
  vertexShader: VS, fragmentShader: fs, uniforms: u,
  glslVersion: THREE.GLSL3,
})
const sph = new THREE.Mesh(new THREE.SphereGeometry(1.001, 96, 48), mat)
scene.add(sph)
const ctl = new OrbitControls(cam, rnd.domElement)
ctl.enableDamping = true
ctl.autoRotate = true
ctl.autoRotateSpeed = 0.5

const S = {
  Ω: 0.5, Ωmax: 2.0, K: 0.08, qMax: 5,
  gain: 60, STEPS: 96, N: 64,
  auto: true, Δt: 24, rotate: true,
}

function lock(x, qMax, K){
  for(let q = 1; q <= qMax; q++){
    const p = Math.round(x * q)
    if(p < 0) continue
    const d = Math.abs(p/q - x)
    const w = K / (q*q)
    if(d <= w) return {p, q, amp: 1 - d/w, locked: true}
  }
  const q = qMax, p = Math.round(x * q)
  return {p, q, amp: 0.15, locked: false}
}

// bake C and S for q=1..5
let VC = [], VS_ = []
function rebake(){
  for(const t of VC) t?.dispose()
  for(const t of VS_) t?.dispose()
  VC = [null], VS_ = [null]
  for(let q = 1; q <= 5; q++){
    const k = ALPHA[q][0]
    VC.push(bakeMode(q,  q, k, S.N))
    VS_.push(bakeMode(q, -q, k, S.N))
  }
}
rebake()

const gui = new GUI({title:'sub-harmonic lock · 3D'})
gui.add(S,'Ω', 0, S.Ωmax, 0.0005).listen()
gui.add(S,'K', 0.01, 0.3, 0.005)
gui.add(S,'qMax', 2, 5, 1)
gui.add(S,'gain', 1, 300, 1).onChange(v=>u.gain.value=v)
gui.add(S,'STEPS', 32, 256, 4).onChange(v=>u.STEPS.value=v)
gui.add(S,'N', 32, 128, 16).name('bake N').onChange(rebake)
gui.add(S,'auto').name('auto Ω(t)')
gui.add(S,'Δt', 4, 120, 1).name('sweep / s')
gui.add(S,'rotate').onChange(v=>ctl.autoRotate=v)

const C = document.getElementById('stairC').getContext('2d')
const SW = 260, SH = 130
function drawStair(cur){
  C.fillStyle = '#050a10'; C.fillRect(0, 0, SW, SH)
  C.strokeStyle = '#1a2230'; C.strokeRect(.5, .5, SW-1, SH-1)
  C.fillStyle = '#9cf'
  for(let i = 0; i < SW; i++){
    const x = (i/(SW-1))*S.Ωmax
    const lk = lock(x, S.qMax, S.K)
    if(!lk.locked) continue
    const y = SH-1 - ((lk.p/lk.q)/S.Ωmax)*(SH-2)
    C.fillRect(i, y, 1, 1)
  }
  C.strokeStyle = '#223040'
  C.beginPath(); C.moveTo(0, SH-1); C.lineTo(SW-1, 0); C.stroke()
  const cx = (S.Ω/S.Ωmax)*(SW-1)
  const cy = SH-1 - ((cur.p/cur.q)/S.Ωmax)*(SH-2)
  C.fillStyle = '#fc9'
  C.beginPath(); C.arc(cx, cy, 3, 0, Math.PI*2); C.fill()
  C.fillStyle = '#456'
  C.fillText('Ω', SW-10, SH-4)
  C.fillText('p/q', 4, 10)
}

const hud = document.getElementById('hud')
let last = performance.now(), sweep = 0
function loop(){
  const now = performance.now()
  const dt = (now - last) * 1e-3; last = now
  u.t.value += dt
  if(S.auto){
    sweep += dt / Math.max(S.Δt, 1)
    const p = sweep % 2
    S.Ω = (p < 1 ? p : 2 - p) * S.Ωmax
  }
  const lk = lock(S.Ω, S.qMax, S.K)
  const q = Math.max(1, Math.min(5, lk.q))
  u.volC.value = VC[q]
  u.volS.value = VS_[q]
  u.w.value = lk.p / lk.q
  u.amp.value = lk.amp
  ctl.update()
  rnd.render(scene, cam)
  drawStair(lk)
  hud.textContent =
    `Ω = ${S.Ω.toFixed(4)}\n`+
    `lock: ${lk.p}/${lk.q}  ${lk.locked ? '✓' : '∅'}\n`+
    `ω_eff = ${(lk.p/lk.q).toFixed(4)}  amp = ${lk.amp.toFixed(3)}\n`+
    `K = ${S.K.toFixed(3)}  q_max = ${S.qMax}  bake=${S.N}³`
  requestAnimationFrame(loop)
}
loop()
</script>
